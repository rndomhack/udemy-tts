<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>{% if page.title %}{{ page.title }} · {% endif %}Udemy TTS</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" href="{{ '/assets/img/icon-48.png' | relative_url }}">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>
  <header class="site-header">
    <a class="brand" href="{{ '/' | relative_url }}">
      <img src="{{ '/assets/img/icon-48.png' | relative_url }}" alt="" width="26" height="26">
      <span>Udemy TTS</span>
    </a>
    <nav>
      <a href="{{ '/' | relative_url }}">Home</a>
      <a href="{{ '/privacy' | relative_url }}">Privacy</a>
      <a href="https://github.com/rndomhack/udemy-tts">GitHub</a>
    </nav>
  </header>

  <main>
    {{ content }}
  </main>

  <footer class="site-footer">
    <p>
      <a href="https://github.com/rndomhack/udemy-tts">Source on GitHub</a>
      ·
      <a href="{{ '/privacy' | relative_url }}">Privacy policy</a>
    </p>
  </footer>
</body>
</html>

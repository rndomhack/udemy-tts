guide:
  title: "Kā izmantot tulkošanas pakalpojumu sniedzējus"
  intro: "Tulkošanā tiek izmantots ģeneratīvais MI. Izvēlieties vienu no tālāk norādītajiem pakalpojumu sniedzējiem, iegūstiet API atslēgu un iestatiet to paplašinājuma iestatījumos — tas aizņem tikai dažas minūtes."
  privacy: "Jūsu API atslēga tiek glabāta tikai jūsu pārlūkprogrammā un tiek nosūtīta tikai jūsu izvēlētajam pakalpojumu sniedzējam."
  disclaimer: "Jūs izmantojat pakalpojumu sniedzēju un maksājat par to uz savu risku. Katram gadījumam iesakām iestatīt tēriņu limitu."
  commonStep: "Ielīmējiet nokopēto atslēgu paplašinājuma iestatījumu laukā \"API atslēga\", izvēlieties modeli un noklikšķiniet uz \"Pārbaudīt savienojumu\"."
  openSettings: "Atvērt iestatījumus"
  optionsLink: "Kā izmantot tulkošanas pakalpojumu sniedzējus"
  modelsHeading: "Pieejamie modeļi"
  modelsHint: "Paplašinājums piedāvā šādus modeļus kā sagataves. Tulkošana apstrādā daudz īsu subtitru, tāpēc lēts un ātrs modelis ir pilnīgi pietiekams. Lūk, kā katrs modelis salīdzinās pēc kvalitātes, ātruma un izmaksām."
  keyHeading: "API atslēgas iegūšana"
  billingHeading: "Cenas un maksājumi"
  limitHeading: "Tēriņu kontrole"
  models:
    gemini31FlashLite: "Ātrums: augsts | Precizitāte: vidēja | Izmaksas: zemas | Precizitāte tulkošanai ir pilnīgi pietiekama. Ieteicams, ja neesat pārliecināts."
    gemini35FlashLite: "Ātrums: augsts | Precizitāte: augsts | Izmaksas: vidēja | 3.1 sērijas pēctecis ar ievērojami augstāku precizitāti, taču nedaudz augstāku cenu."
    gemma431bIt: "Ātrums: zemas | Precizitāte: zemas | Izmaksas: bezmaksas | Izmantojams bezmaksas līmenī. Izvēle, kad galvenokārt vēlaties samazināt izmaksas."
    gpt54Mini: "Ātrums: vidēja | Precizitāte: augsts | Izmaksas: augsts | Izmaksas ir augstas, tāpēc piemērots, ja par prioritāti izvirzāt kvalitāti."
    gpt54Nano: "Ātrums: vidēja | Precizitāte: vidēja | Izmaksas: zemas | Lētāks par mini, taču praktisks tulkošanai."
    deepseekV4Flash: "Ātrums: vidēja | Precizitāte: augsts | Izmaksas: zemas | Diezgan lēts, bet ar augstu precizitāti. Labākā izvēle, kad svarīgas izmaksas."
    qwen36Flash: "Ātrums: augsts | Precizitāte: vidēja | Izmaksas: zemas | Lēts, un precizitāte arī ir pieņemama."
  gemini:
    tagline: "Pieejams Gemini, kā arī bezmaksas Gemma. Ieteicams, ja neesat pārliecināts, ko izvēlēties."
    step1: "Atveriet Google AI Studio un pierakstieties ar savu Google kontu."
    step2: "Noklikšķiniet uz \"Izveidot API atslēgu\", piešķiriet atslēgai nosaukumu, izvēlieties projektu (vai izmantojiet \"Izveidot projektu\") un pēc tam noklikšķiniet uz \"Izveidot atslēgu\"."
    step3: "Nokopējiet parādīto API atslēgu."
    note: "Bezmaksas līmenim ir pieprasījumu ātruma ierobežojumi, taču lekciju skatīšanai ar to parasti pietiek."
    billing: "Bezmaksas līmenī maksājumu informācija nav nepieciešama. Norēķinu iespējošana mīkstina ātruma ierobežojumus pat bezmaksas modeļiem, taču ņemiet vērā: norēķini ir priekšapmaksas, un API atslēga pārstāj darboties, līdz iegādājaties kredītus. Lai iespējotu norēķinus, lapā \"Norēķini\" izmantojiet \"Iestatīt norēķinus\", lai reģistrētu maksājumu informāciju, un pēc tam iegādājieties kredītus ar \"Pirkt kredītus\" (minimālā summa tiek parādīta ekrānā)."
    limit: "Lapā \"Tēriņi\" iestatījums \"Mēneša tēriņu limits\" nosaka ikmēneša lietošanas limitu. Izmantojiet \"Rediģēt tēriņu limitu\", lai iestatītu summu."
  openai:
    tagline: "Pieejami ChatGPT modeļi. Kredīts jāiegādājas iepriekš."
    step1: "Pierakstieties OpenAI Platform un atveriet lapu \"API keys\"."
    step2: "Noklikšķiniet uz \"Create new secret key\" un piešķiriet jebkādu nosaukumu."
    step3: "Nokopējiet atslēgu. Tā tiek parādīta tikai vienu reizi, tāpēc nokopējiet to uzreiz."
    note: "Tas ir atsevišķi no maksas ChatGPT plāna."
    billing: "Kredīts jāiegādājas iepriekš. Lapā \"Billing\" reģistrējiet maksājuma metodi, izmantojot \"Add payment details\", pēc tam iegādājieties kredītu, izmantojot \"Add to credit balance\"."
    limit: "Lapā \"Limits\" izmantojiet \"Edit spend limit\", lai iestatītu ikmēneša lietošanas limitu."
  openrouter:
    tagline: "Pieejami daudzi modeļi. Kredīti jāiegādājas iepriekš."
    step1: "Pierakstieties OpenRouter un atveriet lapu \"API keys\"."
    step2: "Noklikšķiniet uz \"New Key\", piešķiriet jebkādu nosaukumu un noklikšķiniet uz \"Create\". Tālāk aprakstītais tēriņu limits arī tiek ievadīts šeit."
    step3: "Nokopējiet atslēgu. Tā tiek parādīta tikai vienu reizi, tāpēc nokopējiet to uzreiz."
    note: "Pakalpojumu sniedzēju prioritāti var pielāgot paplašinājuma iestatījumos."
    billing: "Kredīti jāiegādājas iepriekš. Lapā \"Credits\" noklikšķiniet uz \"Add Credits\", ievadiet summu un apstipriniet ar \"Purchase\"."
    limit: "Veidojot atslēgu, ievadiet summu laukā \"Credit limit\" un izvēlieties periodu \"Reset limit every...\", lai iestatītu lietošanas limitu katram periodam."

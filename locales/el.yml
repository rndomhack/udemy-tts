guide:
  title: "Πώς να χρησιμοποιήσετε τους παρόχους μετάφρασης"
  intro: "Η μετάφραση χρησιμοποιεί γενετική AI. Επιλέξτε έναν από τους παρακάτω παρόχους, αποκτήστε κλειδί API και καταχωρίστε το στις ρυθμίσεις της επέκτασης — χρειάζονται μόνο λίγα λεπτά."
  privacy: "Το κλειδί API αποθηκεύεται μόνο στο πρόγραμμα περιήγησής σας και αποστέλλεται μόνο στον πάροχο που επιλέξατε."
  disclaimer: "Η χρήση και η πληρωμή του παρόχου γίνονται με δική σας ευθύνη. Συνιστούμε να ορίσετε ένα όριο δαπανών για κάθε ενδεχόμενο."
  commonStep: "Επικολλήστε το αντιγραμμένο κλειδί στο πεδίο «Κλειδί API» στις ρυθμίσεις της επέκτασης, επιλέξτε μοντέλο και πατήστε «Δοκιμή σύνδεσης»."
  openSettings: "Άνοιγμα ρυθμίσεων"
  optionsLink: "Πώς να χρησιμοποιήσετε τους παρόχους μετάφρασης"
  modelsHeading: "Διαθέσιμα μοντέλα"
  modelsHint: "Η επέκταση προσφέρει τα παρακάτω μοντέλα ως προεπιλογές. Η μετάφραση επεξεργάζεται πολλούς σύντομους υπότιτλους, οπότε ένα φθηνό και γρήγορο μοντέλο αρκεί. Δείτε πώς συγκρίνεται κάθε μοντέλο ως προς την ποιότητα, την ταχύτητα και το κόστος."
  keyHeading: "Απόκτηση κλειδιού API"
  billingHeading: "Τιμολόγηση και πληρωμή"
  limitHeading: "Έλεγχος των δαπανών σας"
  models:
    gemini31FlashLite: "Ταχύτητα: Υψηλή | Ακρίβεια: Μεσαία | Κόστος: Χαμηλό | Η ακρίβεια είναι αρκετή για μετάφραση. Συνιστάται αν δεν είστε σίγουροι."
    gemini35FlashLite: "Ταχύτητα: Υψηλή | Ακρίβεια: Υψηλή | Κόστος: Μεσαία | Ο διάδοχος της σειράς 3.1 με σημαντικά υψηλότερη ακρίβεια, αλλά ελαφρώς υψηλότερο κόστος."
    gemma431bIt: "Ταχύτητα: Χαμηλό | Ακρίβεια: Χαμηλό | Κόστος: Δωρεάν | Χρησιμοποιείται στη δωρεάν βαθμίδα. Η επιλογή όταν θέλετε κυρίως να κρατήσετε χαμηλά το κόστος."
    gpt54Mini: "Ταχύτητα: Μεσαία | Ακρίβεια: Υψηλή | Κόστος: Υψηλή | Το κόστος είναι υψηλό, οπότε ταιριάζει όταν δίνετε προτεραιότητα στην ποιότητα."
    gpt54Nano: "Ταχύτητα: Μεσαία | Ακρίβεια: Μεσαία | Κόστος: Χαμηλό | Φθηνότερο από το mini, αλλά πρακτικό για μετάφραση."
    deepseekV4Flash: "Ταχύτητα: Μεσαία | Ακρίβεια: Υψηλή | Κόστος: Χαμηλό | Αρκετά φθηνό, με υψηλή ακρίβεια. Η κορυφαία επιλογή όταν μετράει το κόστος."
    qwen36Flash: "Ταχύτητα: Υψηλή | Ακρίβεια: Μεσαία | Κόστος: Χαμηλό | Οικονομικό, με αρκετά καλή ακρίβεια."
  gemini:
    tagline: "Διαθέσιμο το Gemini, καθώς και το δωρεάν Gemma. Συνιστάται αν δεν είστε σίγουροι ποιο να επιλέξετε."
    step1: "Ανοίξτε το Google AI Studio και συνδεθείτε με τον λογαριασμό σας Google."
    step2: "Πατήστε «Δημιουργία κλειδιού API», δώστε όνομα στο κλειδί, επιλέξτε ένα έργο (ή χρησιμοποιήστε «Δημιουργία έργου») και έπειτα πατήστε «Δημιουργία κλειδιού»."
    step3: "Αντιγράψτε το κλειδί API που εμφανίζεται."
    note: "Η δωρεάν βαθμίδα έχει όρια χρήσης, αλλά συνήθως αρκεί για την παρακολούθηση διαλέξεων."
    billing: "Στη δωρεάν βαθμίδα δεν χρειάζονται στοιχεία πληρωμής. Η ενεργοποίηση της χρέωσης χαλαρώνει τα όρια χρήσης ακόμη και για τα δωρεάν μοντέλα, αλλά προσοχή: η χρέωση είναι προπληρωμένη και το κλειδί API σταματά να λειτουργεί μέχρι να αγοράσετε πιστώσεις. Για να ενεργοποιήσετε τη χρέωση, χρησιμοποιήστε «Ρύθμιση χρέωσης» στη σελίδα Χρέωση για να καταχωρίσετε τα στοιχεία πληρωμής σας και έπειτα αγοράστε πιστώσεις με «Αγορά πιστώσεων» (το ελάχιστο ποσό εμφανίζεται στην οθόνη)."
    limit: "Στη σελίδα Δαπάνες, το «Μηνιαίο όριο δαπανών» ορίζει ένα μηνιαίο όριο χρήσης. Χρησιμοποιήστε «Επεξεργασία ορίου δαπανών» για να ορίσετε το ποσό."
  openai:
    tagline: "Διαθέσιμα τα μοντέλα ChatGPT. Πρέπει να αγοράσετε πίστωση εκ των προτέρων."
    step1: "Συνδεθείτε στο OpenAI Platform και ανοίξτε τη σελίδα API keys."
    step2: "Πατήστε «Create new secret key» και δώστε οποιοδήποτε όνομα."
    step3: "Αντιγράψτε το κλειδί. Εμφανίζεται μόνο μία φορά, οπότε αντιγράψτε το αμέσως."
    note: "Αυτό είναι ανεξάρτητο από τυχόν επί πληρωμή συνδρομή ChatGPT."
    billing: "Πρέπει να αγοράσετε πίστωση εκ των προτέρων. Στη σελίδα Billing, καταχωρίστε μέθοδο πληρωμής μέσω «Add payment details» και έπειτα αγοράστε πίστωση μέσω «Add to credit balance»."
    limit: "Στη σελίδα Limits, χρησιμοποιήστε «Edit spend limit» για να ορίσετε μηνιαίο όριο χρήσης."
  openrouter:
    tagline: "Διαθέσιμα πολλά μοντέλα. Πρέπει να αγοράσετε πίστωση εκ των προτέρων."
    step1: "Συνδεθείτε στο OpenRouter και ανοίξτε τη σελίδα API keys."
    step2: "Πατήστε «New Key», δώστε οποιοδήποτε όνομα και πατήστε «Create». Το όριο δαπανών που περιγράφεται παρακάτω εισάγεται επίσης εδώ."
    step3: "Αντιγράψτε το κλειδί. Εμφανίζεται μόνο μία φορά, οπότε αντιγράψτε το αμέσως."
    note: "Η προτεραιότητα των παρόχων ρυθμίζεται στις ρυθμίσεις της επέκτασης."
    billing: "Πρέπει να αγοράσετε πίστωση εκ των προτέρων. Στη σελίδα Credits, πατήστε «Add Credits», εισαγάγετε ένα ποσό και επιβεβαιώστε με «Purchase»."
    limit: "Κατά τη δημιουργία κλειδιού, εισαγάγετε ένα ποσό στο «Credit limit» και επιλέξτε περίοδο στο «Reset limit every...» για να ορίσετε όριο χρήσης ανά περίοδο."

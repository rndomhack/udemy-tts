guide:
  title: "번역 제공자 사용 방법"
  intro: "번역에는 생성형 AI를 사용합니다. 아래 제공자 중 하나를 선택해 API 키를 발급받고 확장 프로그램 설정에 등록하세요. 몇 분이면 완료됩니다."
  privacy: "API 키는 사용자의 브라우저에만 저장되며 선택한 제공자에게만 전송됩니다."
  disclaimer: "제공자의 이용과 결제는 본인 책임입니다. 만일을 대비해 지출 한도 설정을 권장합니다."
  commonStep: "복사한 키를 확장 프로그램 설정의 \"API 키\" 입력란에 붙여넣고 모델을 선택한 뒤 \"연결 테스트\"를 클릭하세요."
  openSettings: "설정 열기"
  optionsLink: "번역 제공자 사용 방법"
  modelsHeading: "사용 가능한 모델"
  modelsHint: "확장 프로그램은 다음 모델을 프리셋으로 제공합니다. 번역은 짧은 자막을 대량으로 처리하므로 저렴하고 빠른 모델이면 충분합니다. 각 모델의 품질, 속도, 비용 비교는 다음과 같습니다."
  keyHeading: "API 키 발급"
  billingHeading: "요금 및 결제"
  limitHeading: "지출 관리"
  models:
    gemini31FlashLite: "속도: 높음 | 정확도: 중간 | 비용: 낮음 | 정확도는 번역에 충분합니다. 어떤 것을 고를지 모르겠다면 추천합니다."
    gemini35FlashLite: "속도: 높음 | 정확도: 높음 | 비용: 중간 | 3.1 시리즈의 후속 모델로 정확도가 크게 향상되었지만, 비용은 다소 높습니다."
    gemma431bIt: "속도: 낮음 | 정확도: 낮음 | 비용: 무료 | 무료 등급에서 사용할 수 있습니다. 주로 비용을 낮추고 싶을 때 선택합니다."
    gpt54Mini: "속도: 중간 | 정확도: 높음 | 비용: 높음 | 비용이 높은 편이라 품질을 우선한다면 적합합니다."
    gpt54Nano: "속도: 중간 | 정확도: 중간 | 비용: 낮음 | mini보다 저렴하지만 번역에는 실용적입니다."
    deepseekV4Flash: "속도: 중간 | 정확도: 높음 | 비용: 낮음 | 꽤 저렴하면서도 정확도가 높습니다. 비용이 중요할 때 최고의 선택입니다."
    qwen36Flash: "속도: 높음 | 정확도: 중간 | 비용: 낮음 | 저렴하고 정확도도 괜찮습니다."
  gemini:
    tagline: "Gemini를 사용할 수 있으며 무료인 Gemma도 있습니다. 어떤 것을 고를지 모르겠다면 추천합니다."
    step1: "Google AI Studio를 열고 Google 계정으로 로그인하세요."
    step2: "\"API 키 만들기\"를 클릭하고 키 이름을 지정한 뒤 프로젝트를 선택하고(없으면 \"프로젝트 만들기\" 사용), \"키 만들기\"를 클릭하세요."
    step3: "표시된 API 키를 복사하세요."
    note: "무료 등급에는 사용량 제한이 있지만 강의 시청에는 대체로 충분합니다."
    billing: "무료 등급에서는 결제 정보가 필요 없습니다. 결제를 사용 설정하면 무료 모델에서도 사용량 제한이 완화되지만, 선불제이므로 크레딧을 구매할 때까지 API 키를 사용할 수 없게 되는 점에 유의하세요. 결제를 사용 설정하려면 결제 페이지에서 \"결제 설정\"으로 결제 정보를 등록한 뒤 \"크레딧 구매\"로 크레딧을 구매하세요 (최소 금액은 화면에 표시됩니다)."
    limit: "지출 페이지에서 \"월별 지출 한도\"로 월간 사용량 한도를 설정합니다. \"지출 한도 수정\"으로 금액을 지정하세요."
  openai:
    tagline: "ChatGPT 모델을 사용할 수 있습니다. 미리 크레딧을 구매해야 합니다."
    step1: "OpenAI Platform에 로그인하고 API keys 페이지를 여세요."
    step2: "\"Create new secret key\"를 클릭하고 아무 이름이나 지정하세요."
    step3: "키를 복사하세요. 한 번만 표시되므로 바로 복사해야 합니다."
    note: "유료 ChatGPT 요금제와는 별개입니다."
    billing: "미리 크레딧을 구매해야 합니다. Billing 페이지에서 \"Add payment details\"로 결제 수단을 등록한 뒤 \"Add to credit balance\"로 크레딧을 구매하세요."
    limit: "Limits 페이지에서 \"Edit spend limit\"으로 월간 사용량 한도를 설정하세요."
  openrouter:
    tagline: "다양한 모델을 사용할 수 있습니다. 미리 크레딧을 구매해야 합니다."
    step1: "OpenRouter에 로그인하고 API keys 페이지를 여세요."
    step2: "\"New Key\"를 클릭하고 아무 이름이나 지정한 뒤 \"Create\"를 클릭하세요. 아래에서 설명하는 지출 한도도 여기서 입력합니다."
    step3: "키를 복사하세요. 한 번만 표시되므로 바로 복사해야 합니다."
    note: "제공자 우선순위는 확장 프로그램 설정에서 조정할 수 있습니다."
    billing: "미리 크레딧을 구매해야 합니다. Credits 페이지에서 \"Add Credits\"를 클릭하고 금액을 입력한 뒤 \"Purchase\"로 확정하세요."
    limit: "키를 생성할 때 \"Credit limit\"에 금액을 입력하고 \"Reset limit every...\"에서 주기를 선택하면 주기별 사용량 한도를 설정할 수 있습니다."

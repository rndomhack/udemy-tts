guide:
  title: "Cum să folosiți furnizorii de traducere"
  intro: "Traducerea folosește IA generativă. Alegeți unul dintre furnizorii de mai jos, obțineți o cheie API și setați-o în setările extensiei — durează doar câteva minute."
  privacy: "Cheia API este stocată doar în browserul dvs. și este trimisă doar furnizorului selectat."
  disclaimer: "Folosiți și plătiți furnizorul pe propriul risc. Vă recomandăm să setați o limită de cheltuieli pentru orice eventualitate."
  commonStep: "Lipiți cheia copiată în câmpul „Cheie API” din setările extensiei, alegeți un model și apăsați „Testează conexiunea”."
  openSettings: "Deschide setările"
  optionsLink: "Cum să folosiți furnizorii de traducere"
  modelsHeading: "Modele disponibile"
  modelsHint: "Extensia oferă următoarele modele ca presetări. Traducerea procesează multe subtitrări scurte, așa că un model ieftin și rapid este suficient. Iată cum se compară fiecare model în privința calității, vitezei și costului."
  keyHeading: "Obținerea unei chei API"
  billingHeading: "Prețuri și plată"
  limitHeading: "Controlul cheltuielilor"
  models:
    gemini31FlashLite: "Viteză: Mare | Acuratețe: Medie | Cost: Scăzut | Acuratețea este suficientă pentru traducere. Recomandat dacă nu sunteți sigur."
    gemini35FlashLite: "Viteză: Mare | Acuratețe: Mare | Cost: Medie | Succesorul seriei 3.1, cu o acuratețe semnificativ mai mare, dar un cost puțin mai ridicat."
    gemma431bIt: "Viteză: Scăzut | Acuratețe: Scăzut | Cost: Gratuit | Utilizabil în nivelul gratuit. Alegerea când doriți în principal să mențineți costurile scăzute."
    gpt54Mini: "Viteză: Medie | Acuratețe: Mare | Cost: Mare | Costul este ridicat, deci potrivit când prioritizați calitatea."
    gpt54Nano: "Viteză: Medie | Acuratețe: Medie | Cost: Scăzut | Mai ieftin decât mini, dar practic pentru traducere."
    deepseekV4Flash: "Viteză: Medie | Acuratețe: Mare | Cost: Scăzut | Destul de ieftin, totuși cu acuratețe mare. Cea mai bună alegere când contează costul."
    qwen36Flash: "Viteză: Mare | Acuratețe: Medie | Cost: Scăzut | Ieftin, iar acuratețea este de asemenea decentă."
  gemini:
    tagline: "Gemini este disponibil, plus Gemma gratuită. Recomandat dacă nu sunteți sigur ce să alegeți."
    step1: "Deschideți Google AI Studio și conectați-vă cu contul Google."
    step2: "Apăsați „Creare cheie API”, denumiți cheia, alegeți un proiect (sau folosiți „Creare proiect”), apoi apăsați „Creare cheie”."
    step3: "Copiați cheia API afișată."
    note: "Nivelul gratuit are limite de rată, dar de obicei este suficient pentru vizionarea cursurilor."
    billing: "În nivelul gratuit nu sunt necesare date de plată. Activarea facturării relaxează limitele de rată chiar și pentru modelele gratuite, dar rețineți: facturarea este preplătită, iar cheia API nu mai funcționează până când cumpărați credite. Pentru a activa facturarea, folosiți „Configurare facturare” pe pagina „Facturare” pentru a înregistra datele de plată, apoi cumpărați credite cu „Cumpărați credite” (suma minimă este afișată pe ecran)."
    limit: "Pe pagina „Cheltuieli”, „Plafon lunar de cheltuieli” setează o limită lunară de utilizare. Folosiți „Editare plafon de cheltuieli” pentru a stabili suma."
  openai:
    tagline: "Modelele ChatGPT sunt disponibile. Trebuie să cumpărați credit în avans."
    step1: "Conectați-vă la OpenAI Platform și deschideți pagina API keys."
    step2: "Apăsați „Create new secret key” și dați-i orice nume."
    step3: "Copiați cheia. Este afișată o singură dată, așa că copiați-o pe loc."
    note: "Aceasta este separată de un plan ChatGPT cu plată."
    billing: "Trebuie să cumpărați credit în avans. Pe pagina Billing, înregistrați o metodă de plată prin „Add payment details”, apoi cumpărați credit prin „Add to credit balance”."
    limit: "Pe pagina Limits, folosiți „Edit spend limit” pentru a seta o limită lunară de utilizare."
  openrouter:
    tagline: "Sunt disponibile multe modele. Trebuie să cumpărați credite în avans."
    step1: "Conectați-vă la OpenRouter și deschideți pagina API keys."
    step2: "Apăsați „New Key”, dați-i orice nume și apăsați „Create”. Limita de cheltuieli descrisă mai jos se introduce tot aici."
    step3: "Copiați cheia. Este afișată o singură dată, așa că copiați-o pe loc."
    note: "Prioritatea furnizorilor poate fi ajustată în setările extensiei."
    billing: "Trebuie să cumpărați credite în avans. Pe pagina Credits, apăsați „Add Credits”, introduceți o sumă și confirmați cu „Purchase”."
    limit: "La crearea unei chei, introduceți o sumă în „Credit limit” și alegeți o perioadă în „Reset limit every...” pentru a seta o limită de utilizare per perioadă."

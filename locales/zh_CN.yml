guide:
  title: "如何使用翻译服务商"
  intro: "翻译功能使用生成式 AI。请从下面的服务商中选择一个，获取 API 密钥并填入扩展设置，只需几分钟即可完成。"
  privacy: "API 密钥仅保存在您的浏览器中，且只会发送给您所选的服务商。"
  disclaimer: "使用服务商及相关费用由您自行承担。以防万一，建议设置消费上限。"
  commonStep: "将复制的密钥粘贴到扩展设置的“API 密钥”栏中，选择模型后点击“测试连接”。"
  openSettings: "打开设置"
  optionsLink: "如何使用翻译服务商"
  modelsHeading: "可用模型"
  modelsHint: "扩展提供以下模型作为预设。翻译需要处理大量简短字幕，因此便宜又快速的模型就足够了。以下是各模型在质量、速度和费用方面的对比。"
  keyHeading: "获取 API 密钥"
  billingHeading: "价格与支付"
  limitHeading: "控制消费金额"
  models:
    gemini31FlashLite: "速度: 高 | 精度: 中 | 费用: 低 | 精度对翻译来说足够。不确定选哪个时推荐使用。"
    gemini35FlashLite: "速度: 高 | 精度: 高 | 费用: 中 | 3.1 系列的后继模型，精度显著提升，但费用略高。"
    gemma431bIt: "速度: 低 | 精度: 低 | 费用: 免费 | 可在免费额度下使用。主要想压低成本时的选择。"
    gpt54Mini: "速度: 中 | 精度: 高 | 费用: 高 | 费用较高，适合优先考虑质量的情况。"
    gpt54Nano: "速度: 中 | 精度: 中 | 费用: 低 | 比 mini 便宜，但用于翻译很实用。"
    deepseekV4Flash: "速度: 中 | 精度: 高 | 费用: 低 | 相当便宜，但精度很高。注重成本时的首选。"
    qwen36Flash: "速度: 高 | 精度: 中 | 费用: 低 | 价格低廉，精度也还不错。"
  gemini:
    tagline: "可使用 Gemini，还有免费的 Gemma。不确定选哪个时推荐使用。"
    step1: "打开 Google AI Studio 并使用 Google 账号登录。"
    step2: "点击“创建 API 密钥”，为密钥命名，选择一个项目（或使用“创建项目”），然后点击“创建密钥”。"
    step3: "复制显示出来的 API 密钥。"
    note: "免费额度有速率限制，但通常足以满足观看课程的需要。"
    billing: "免费额度无需支付信息。启用结算后即使是免费模型也会放宽速率限制，但请注意：结算采用预付费方式，在购买抵免额之前 API 密钥将无法使用。要启用结算，请在“结算”页面使用“设置结算”登记支付信息，然后通过“购买抵免额”购买（最低金额会显示在界面上）。"
    limit: "在“支出”页面，“每月支出上限”可设置每月使用上限。使用“修改支出上限”来指定金额。"
  openai:
    tagline: "可使用 ChatGPT 模型。需要事先购买额度。"
    step1: "登录 OpenAI Platform 并打开 API keys 页面。"
    step2: "点击“Create new secret key”并任意命名。"
    step3: "复制密钥。密钥只显示一次，请立即复制。"
    note: "这与付费的 ChatGPT 套餐是分开的。"
    billing: "需要事先购买额度。在 Billing 页面，通过“Add payment details”登记支付方式，然后通过“Add to credit balance”购买额度。"
    limit: "在 Limits 页面，使用“Edit spend limit”设置每月使用上限。"
  openrouter:
    tagline: "可使用众多模型。需要事先购买额度。"
    step1: "登录 OpenRouter 并打开 API keys 页面。"
    step2: "点击“New Key”，任意命名，然后点击“Create”。下述的消费上限也在此处输入。"
    step3: "复制密钥。密钥只显示一次，请立即复制。"
    note: "服务商优先级可在扩展设置中调整。"
    billing: "需要事先购买额度。在 Credits 页面点击“Add Credits”，输入金额，然后通过“Purchase”确认。"
    limit: "创建密钥时，在“Credit limit”中输入金额，并在“Reset limit every...”中选择周期，即可设置每个周期的使用上限。"

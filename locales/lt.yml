guide:
  title: "Kaip naudotis vertimo teikėjais"
  intro: "Vertimui naudojamas generatyvusis DI. Pasirinkite vieną iš toliau nurodytų teikėjų, gaukite API raktą ir nurodykite jį plėtinio nustatymuose — tai užtruks vos kelias minutes."
  privacy: "Jūsų API raktas saugomas tik jūsų naršyklėje ir siunčiamas tik jūsų pasirinktam teikėjui."
  disclaimer: "Teikėju naudojatės ir už jį mokate savo pačių rizika. Kad būtų saugiau, rekomenduojame nustatyti išlaidų limitą."
  commonStep: "Įklijuokite nukopijuotą raktą į plėtinio nustatymų lauką \"API raktas\", pasirinkite modelį ir spustelėkite \"Tikrinti ryšį\"."
  openSettings: "Atidaryti nustatymus"
  optionsLink: "Kaip naudotis vertimo teikėjais"
  modelsHeading: "Galimi modeliai"
  modelsHint: "Plėtinys siūlo šiuos modelius kaip šablonus. Vertimas apdoroja daug trumpų subtitrų, todėl pigaus ir greito modelio visiškai pakanka. Štai kaip kiekvienas modelis atrodo pagal kokybę, greitį ir kainą."
  keyHeading: "API rakto gavimas"
  billingHeading: "Kainos ir mokėjimas"
  limitHeading: "Išlaidų valdymas"
  models:
    gemini31FlashLite: "Greitis: aukštas | Tikslumas: vidutinis | Kaina: žema | Tikslumo pakanka vertimui. Rekomenduojama, jei nesate tikri."
    gemini35FlashLite: "Greitis: aukštas | Tikslumas: aukštas | Kaina: vidutinis | 3.1 serijos įpėdinis su gerokai didesniu tikslumu, tačiau šiek tiek didesne kaina."
    gemma431bIt: "Greitis: žema | Tikslumas: žema | Kaina: nemokama | Tinka nemokamam lygiui. Pasirinkimas, kai svarbiausia mažinti išlaidas."
    gpt54Mini: "Greitis: vidutinis | Tikslumas: aukštas | Kaina: aukštas | Kaina aukšta, todėl tinka, kai prioritetas – kokybė."
    gpt54Nano: "Greitis: vidutinis | Tikslumas: vidutinis | Kaina: žema | Pigesnis nei mini, bet praktiškas vertimui."
    deepseekV4Flash: "Greitis: vidutinis | Tikslumas: aukštas | Kaina: žema | Gana pigus, tačiau tikslumas aukštas. Geriausias pasirinkimas, kai svarbi kaina."
    qwen36Flash: "Greitis: aukštas | Tikslumas: vidutinis | Kaina: žema | Nebrangus, o tikslumas taip pat neblogas."
  gemini:
    tagline: "Galimas Gemini, taip pat nemokamas Gemma. Rekomenduojama, jei nesate tikri, ką pasirinkti."
    step1: "Atidarykite Google AI Studio ir prisijunkite su Google paskyra."
    step2: "Spustelėkite \"Sukurti API raktą\", pavadinkite raktą, pasirinkite projektą (arba naudokite \"Sukurti projektą\") ir spustelėkite \"Sukurti raktą\"."
    step3: "Nukopijuokite parodytą API raktą."
    note: "Nemokamas lygis turi užklausų dažnio limitus, bet paskaitoms žiūrėti jo paprastai pakanka."
    billing: "Nemokamame lygyje mokėjimo informacijos nereikia. Įjungus atsiskaitymą sušvelninami užklausų dažnio limitai net ir nemokamiems modeliams, tačiau atkreipkite dėmesį: atsiskaitymas yra išankstinis ir API raktas neveiks, kol nenusipirksite kreditų. Norėdami įjungti atsiskaitymą, puslapyje \"Atsiskaitymas\" naudokite \"Nustatyti atsiskaitymą\" mokėjimo informacijai įregistruoti, tada nusipirkite kreditų per \"Pirkti kreditų\" (mažiausia suma rodoma ekrane)."
    limit: "Puslapyje \"Išlaidos\" nustatymas \"Mėnesio išlaidų riba\" nustato mėnesio naudojimo limitą. Sumai nurodyti naudokite \"Redaguoti išlaidų ribą\"."
  openai:
    tagline: "Galimi ChatGPT modeliai. Kreditą reikia įsigyti iš anksto."
    step1: "Prisijunkite prie OpenAI Platform ir atidarykite \"API keys\" puslapį."
    step2: "Spustelėkite \"Create new secret key\" ir suteikite bet kokį pavadinimą."
    step3: "Nukopijuokite raktą. Jis rodomas tik vieną kartą, todėl nukopijuokite iš karto."
    note: "Tai atskira nuo mokamo ChatGPT plano."
    billing: "Kreditą reikia įsigyti iš anksto. \"Billing\" puslapyje užregistruokite mokėjimo būdą per \"Add payment details\", tada įsigykite kreditą per \"Add to credit balance\"."
    limit: "\"Limits\" puslapyje naudokite \"Edit spend limit\", kad nustatytumėte mėnesio naudojimo limitą."
  openrouter:
    tagline: "Galima naudoti daugybę modelių. Kreditus reikia įsigyti iš anksto."
    step1: "Prisijunkite prie OpenRouter ir atidarykite \"API keys\" puslapį."
    step2: "Spustelėkite \"New Key\", suteikite bet kokį pavadinimą ir spustelėkite \"Create\". Toliau aprašytas išlaidų limitas taip pat įvedamas čia."
    step3: "Nukopijuokite raktą. Jis rodomas tik vieną kartą, todėl nukopijuokite iš karto."
    note: "Teikėjų prioritetą galima koreguoti plėtinio nustatymuose."
    billing: "Kreditus reikia įsigyti iš anksto. \"Credits\" puslapyje spustelėkite \"Add Credits\", įveskite sumą ir patvirtinkite su \"Purchase\"."
    limit: "Kurdami raktą įveskite sumą lauke \"Credit limit\" ir pasirinkite laikotarpį \"Reset limit every...\", kad nustatytumėte naudojimo ribą kiekvienam laikotarpiui."

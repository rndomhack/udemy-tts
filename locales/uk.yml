guide:
  title: "Як користуватися провайдерами перекладу"
  intro: "Для перекладу використовується генеративний ШІ. Виберіть одного з провайдерів нижче, отримайте ключ API та вкажіть його в налаштуваннях розширення — це займе лише кілька хвилин."
  privacy: "Ключ API зберігається лише у вашому браузері та надсилається лише вибраному провайдеру."
  disclaimer: "Ви використовуєте провайдера та сплачуєте за нього на власний ризик. Про всяк випадок рекомендуємо встановити ліміт витрат."
  commonStep: "Вставте скопійований ключ у поле «Ключ API» в налаштуваннях розширення, виберіть модель і натисніть «Перевірити з’єднання»."
  openSettings: "Відкрити налаштування"
  optionsLink: "Як користуватися провайдерами перекладу"
  modelsHeading: "Доступні моделі"
  modelsHint: "Розширення пропонує наведені нижче моделі як пресети. Переклад обробляє багато коротких субтитрів, тож дешевої та швидкої моделі цілком достатньо. Ось як моделі порівнюються за якістю, швидкістю та вартістю."
  keyHeading: "Отримання ключа API"
  billingHeading: "Ціни та оплата"
  limitHeading: "Контроль витрат"
  models:
    gemini31FlashLite: "Швидкість: Висока | Точність: Середня | Вартість: Низька | Точності цілком достатньо для перекладу. Рекомендовано, якщо не знаєте, що вибрати."
    gemini35FlashLite: "Швидкість: Висока | Точність: Висока | Вартість: Середня | Наступник серії 3.1 з помітно вищою точністю, але дещо вищою вартістю."
    gemma431bIt: "Швидкість: Низька | Точність: Низька | Вартість: Безкоштовно | Доступна на безкоштовному рівні. Вибір, коли головне — мінімізувати витрати."
    gpt54Mini: "Швидкість: Середня | Точність: Висока | Вартість: Висока | Вартість висока, тому підходить, коли якість у пріоритеті."
    gpt54Nano: "Швидкість: Середня | Точність: Середня | Вартість: Низька | Дешевша за mini, але практична для перекладу."
    deepseekV4Flash: "Швидкість: Середня | Точність: Висока | Вартість: Низька | Досить дешева, але з високою точністю. Найкращий вибір, коли важлива вартість."
    qwen36Flash: "Швидкість: Висока | Точність: Середня | Вартість: Низька | Недорога, і точність також непогана."
  gemini:
    tagline: "Доступний Gemini, а також безкоштовний Gemma. Рекомендовано, якщо не знаєте, що вибрати."
    step1: "Відкрийте Google AI Studio та увійдіть за допомогою облікового запису Google."
    step2: "Натисніть «Створити ключ API», задайте назву ключа, виберіть проект (або скористайтеся «Створити проект»), потім натисніть «Створити ключ»."
    step3: "Скопіюйте показаний ключ API."
    note: "Безкоштовний рівень має обмеження на частоту запитів, але для перегляду лекцій його зазвичай достатньо."
    billing: "На безкоштовному рівні платіжні дані не потрібні. Увімкнення оплати послаблює обмеження на частоту навіть для безкоштовних моделей, але зверніть увагу: оплата передплатна, і ключ API не працюватиме, доки ви не купите кредити. Щоб увімкнути оплату, скористайтеся «Налаштувати платіжний акаунт» на сторінці «Платежі», щоб зареєструвати платіжні дані, а потім купіть кредити через «Купити кредити» (мінімальна сума показана на екрані)."
    limit: "На сторінці «Витрати» параметр «Місячний ліміт витрат» задає місячне обмеження використання. Скористайтеся «Змінити ліміт витрат», щоб указати суму."
  openai:
    tagline: "Доступні моделі ChatGPT. Потрібно заздалегідь придбати кредит."
    step1: "Увійдіть в OpenAI Platform і відкрийте сторінку API keys."
    step2: "Натисніть «Create new secret key» і вкажіть будь-яку назву."
    step3: "Скопіюйте ключ. Він показується лише один раз, тому скопіюйте його одразу."
    note: "Це окремо від платного плану ChatGPT."
    billing: "Потрібно заздалегідь придбати кредит. На сторінці Billing зареєструйте спосіб оплати через «Add payment details», а потім придбайте кредит через «Add to credit balance»."
    limit: "На сторінці Limits скористайтеся «Edit spend limit», щоб задати місячне обмеження використання."
  openrouter:
    tagline: "Доступно багато моделей. Потрібно заздалегідь придбати кредити."
    step1: "Увійдіть в OpenRouter і відкрийте сторінку API keys."
    step2: "Натисніть «New Key», вкажіть будь-яку назву й натисніть «Create». Описаний нижче ліміт витрат також вводиться тут."
    step3: "Скопіюйте ключ. Він показується лише один раз, тому скопіюйте його одразу."
    note: "Пріоритет провайдерів можна налаштувати в параметрах розширення."
    billing: "Потрібно заздалегідь придбати кредити. На сторінці Credits натисніть «Add Credits», введіть суму й підтвердьте через «Purchase»."
    limit: "Під час створення ключа введіть суму в полі «Credit limit» і виберіть період у «Reset limit every...», щоб задати обмеження використання на період."

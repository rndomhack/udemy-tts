guide:
  title: "Как пользоваться провайдерами перевода"
  intro: "Для перевода используется генеративный ИИ. Выберите одного из провайдеров ниже, получите ключ API и укажите его в настройках расширения — это займёт всего несколько минут."
  privacy: "Ключ API хранится только в вашем браузере и отправляется только выбранному провайдеру."
  disclaimer: "Вы используете провайдера и оплачиваете его на свой страх и риск. На всякий случай рекомендуем установить лимит расходов."
  commonStep: "Вставьте скопированный ключ в поле «Ключ API» в настройках расширения, выберите модель и нажмите «Проверить соединение»."
  openSettings: "Открыть настройки"
  optionsLink: "Как пользоваться провайдерами перевода"
  modelsHeading: "Доступные модели"
  modelsHint: "Расширение предлагает следующие модели в виде пресетов. При переводе обрабатывается множество коротких субтитров, поэтому дешёвой и быстрой модели вполне достаточно. Вот как модели соотносятся по качеству, скорости и стоимости."
  keyHeading: "Получение ключа API"
  billingHeading: "Цены и оплата"
  limitHeading: "Контроль расходов"
  models:
    gemini31FlashLite: "Скорость: Высокая | Точность: Средняя | Стоимость: Низкая | Точности вполне достаточно для перевода. Рекомендуется, если вы не уверены."
    gemini35FlashLite: "Скорость: Высокая | Точность: Высокая | Стоимость: Средняя | Преемник серии 3.1 с заметно более высокой точностью, но немного более высокой стоимостью."
    gemma431bIt: "Скорость: Низкая | Точность: Низкая | Стоимость: Бесплатно | Доступна на бесплатном уровне. Выбор, когда вы прежде всего хотите снизить расходы."
    gpt54Mini: "Скорость: Средняя | Точность: Высокая | Стоимость: Высокая | Стоимость высокая, поэтому подходит, когда качество в приоритете."
    gpt54Nano: "Скорость: Средняя | Точность: Средняя | Стоимость: Низкая | Дешевле, чем mini, но практична для перевода."
    deepseekV4Flash: "Скорость: Средняя | Точность: Высокая | Стоимость: Низкая | Довольно дешёвая, но с высокой точностью. Лучший выбор, когда важна стоимость."
    qwen36Flash: "Скорость: Высокая | Точность: Средняя | Стоимость: Низкая | Недорогая, и точность тоже неплохая."
  gemini:
    tagline: "Доступен Gemini, а также бесплатная Gemma. Рекомендуется, если вы не знаете, что выбрать."
    step1: "Откройте Google AI Studio и войдите с помощью аккаунта Google."
    step2: "Нажмите «Создать ключ API», задайте имя ключа, выберите проект (или используйте «Создать проект»), затем нажмите «Создать ключ»."
    step3: "Скопируйте показанный ключ API."
    note: "У бесплатного уровня есть ограничения частоты запросов, но для просмотра лекций их обычно достаточно."
    billing: "На бесплатном уровне платёжные данные не требуются. Включение оплаты смягчает ограничения частоты даже для бесплатных моделей, но учтите: оплата предоплатная, и ключ API перестаёт работать, пока вы не купите кредиты. Чтобы включить оплату, используйте «Настроить оплату» на странице «Оплата» для ввода платёжных данных, затем купите кредиты через «Купить кредиты» (минимальная сумма показана на экране)."
    limit: "На странице «Расходы» параметр «Месячный лимит расходов» задаёт месячный лимит использования. Используйте «Изменить лимит расходов», чтобы указать сумму."
  openai:
    tagline: "Доступны модели ChatGPT. Нужно заранее купить кредиты."
    step1: "Войдите в OpenAI Platform и откройте страницу API keys."
    step2: "Нажмите «Create new secret key» и укажите любое имя."
    step3: "Скопируйте ключ. Он показывается только один раз, поэтому скопируйте его сразу."
    note: "Это отдельно от платного плана ChatGPT."
    billing: "Нужно заранее купить кредиты. На странице Billing зарегистрируйте способ оплаты через «Add payment details», затем купите кредиты через «Add to credit balance»."
    limit: "На странице Limits используйте «Edit spend limit», чтобы задать месячный лимит использования."
  openrouter:
    tagline: "Доступно множество моделей. Нужно заранее купить кредиты."
    step1: "Войдите в OpenRouter и откройте страницу API keys."
    step2: "Нажмите «New Key», укажите любое имя и нажмите «Create». Описанный ниже лимит расходов также вводится здесь."
    step3: "Скопируйте ключ. Он показывается только один раз, поэтому скопируйте его сразу."
    note: "Приоритет провайдеров можно настроить в параметрах расширения."
    billing: "Нужно заранее купить кредиты. На странице Credits нажмите «Add Credits», введите сумму и подтвердите через «Purchase»."
    limit: "При создании ключа введите сумму в поле «Credit limit» и выберите период в «Reset limit every...», чтобы задать лимит использования за период."

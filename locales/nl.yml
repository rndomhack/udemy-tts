guide:
  title: "Vertaalproviders gebruiken"
  intro: "Vertaling maakt gebruik van generatieve AI. Kies een van de onderstaande providers, haal een API-sleutel op en stel deze in bij de instellingen van de extensie — dit duurt maar een paar minuten."
  privacy: "Uw API-sleutel wordt alleen in uw browser opgeslagen en alleen naar de door u geselecteerde provider verzonden."
  disclaimer: "U gebruikt en betaalt de provider op eigen risico. We raden aan om voor de zekerheid een uitgavenlimiet in te stellen."
  commonStep: "Plak de gekopieerde sleutel in het veld \"API-sleutel\" in de instellingen van de extensie, kies een model en klik op \"Verbinding testen\"."
  openSettings: "Instellingen openen"
  optionsLink: "Vertaalproviders gebruiken"
  modelsHeading: "Beschikbare modellen"
  modelsHint: "De extensie biedt de volgende modellen als presets. Vertaling verwerkt veel korte ondertitels, dus een goedkoop en snel model is ruim voldoende. Zo verhouden de modellen zich qua kwaliteit, snelheid en kosten."
  keyHeading: "Een API-sleutel verkrijgen"
  billingHeading: "Prijzen en betaling"
  limitHeading: "Uw uitgaven beheren"
  models:
    gemini31FlashLite: "Snelheid: Hoog | Nauwkeurigheid: Gemiddeld | Kosten: Laag | De nauwkeurigheid is ruim voldoende voor vertaling. Aanbevolen als u twijfelt."
    gemini35FlashLite: "Snelheid: Hoog | Nauwkeurigheid: Hoog | Kosten: Gemiddeld | De opvolger van de 3.1-serie, met aanzienlijk hogere nauwkeurigheid, maar iets hogere kosten."
    gemma431bIt: "Snelheid: Laag | Nauwkeurigheid: Laag | Kosten: Gratis | Bruikbaar op het gratis niveau. De keuze wanneer u vooral de kosten laag wilt houden."
    gpt54Mini: "Snelheid: Gemiddeld | Nauwkeurigheid: Hoog | Kosten: Hoog | De kosten zijn hoog, dus geschikt wanneer u kwaliteit vooropstelt."
    gpt54Nano: "Snelheid: Gemiddeld | Nauwkeurigheid: Gemiddeld | Kosten: Laag | Goedkoper dan mini, maar praktisch voor vertaling."
    deepseekV4Flash: "Snelheid: Gemiddeld | Nauwkeurigheid: Hoog | Kosten: Laag | Vrij goedkoop, met toch een hoge nauwkeurigheid. De beste keuze wanneer kosten belangrijk zijn."
    qwen36Flash: "Snelheid: Hoog | Nauwkeurigheid: Gemiddeld | Kosten: Laag | Goedkoop, en de nauwkeurigheid is ook redelijk."
  gemini:
    tagline: "Gemini is beschikbaar, plus het gratis Gemma. Aanbevolen als u twijfelt welke u moet kiezen."
    step1: "Open Google AI Studio en meld u aan met uw Google-account."
    step2: "Klik op \"API-sleutel maken\", geef de sleutel een naam, kies een project (of gebruik \"Project maken\") en klik vervolgens op \"Sleutel maken\"."
    step3: "Kopieer de weergegeven API-sleutel."
    note: "Het gratis niveau heeft snelheidslimieten, maar is meestal voldoende om colleges te volgen."
    billing: "Op het gratis niveau is geen betalingsinformatie nodig. Door facturering in te schakelen worden de snelheidslimieten versoepeld, zelfs voor gratis modellen, maar let op: de facturering is vooruitbetaald en uw API-sleutel werkt pas weer nadat u tegoed hebt gekocht. Om facturering in te schakelen, registreert u via \"Facturering instellen\" op de pagina Facturering uw betalingsgegevens en koopt u daarna tegoed met \"Tegoed kopen\" (het minimumbedrag wordt op het scherm getoond)."
    limit: "Op de pagina Uitgaven stelt \"Maandelijkse uitgavenlimiet\" een maandelijkse gebruikslimiet in. Gebruik \"Uitgavenlimiet bewerken\" om het bedrag in te stellen."
  openai:
    tagline: "ChatGPT-modellen zijn beschikbaar. U moet vooraf tegoed kopen."
    step1: "Meld u aan bij het OpenAI Platform en open de pagina \"API keys\"."
    step2: "Klik op \"Create new secret key\" en geef een willekeurige naam op."
    step3: "Kopieer de sleutel. Deze wordt maar één keer getoond, kopieer hem dus meteen."
    note: "Dit staat los van een betaald ChatGPT-abonnement."
    billing: "U moet vooraf tegoed kopen. Registreer op de pagina \"Billing\" een betaalmethode via \"Add payment details\" en koop vervolgens tegoed via \"Add to credit balance\"."
    limit: "Gebruik op de pagina \"Limits\" de optie \"Edit spend limit\" om een maandelijkse gebruikslimiet in te stellen."
  openrouter:
    tagline: "Er zijn veel modellen beschikbaar. U moet vooraf tegoed kopen."
    step1: "Meld u aan bij OpenRouter en open de pagina \"API keys\"."
    step2: "Klik op \"New Key\", geef een willekeurige naam op en klik op \"Create\". De hieronder beschreven uitgavenlimiet voert u hier ook in."
    step3: "Kopieer de sleutel. Deze wordt maar één keer getoond, kopieer hem dus meteen."
    note: "De providerprioriteit kunt u aanpassen in de instellingen van de extensie."
    billing: "U moet vooraf tegoed kopen. Klik op de pagina \"Credits\" op \"Add Credits\", voer een bedrag in en bevestig met \"Purchase\"."
    limit: "Voer bij het aanmaken van een sleutel een bedrag in bij \"Credit limit\" en kies een periode bij \"Reset limit every...\" om een gebruikslimiet per periode in te stellen."

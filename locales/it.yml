guide:
  title: "Come usare i provider di traduzione"
  intro: "La traduzione utilizza l'IA generativa. Scegli uno dei provider qui sotto, ottieni una chiave API e impostala nelle impostazioni dell'estensione — bastano pochi minuti."
  privacy: "La tua chiave API è salvata solo nel tuo browser e viene inviata solo al provider selezionato."
  disclaimer: "Usi e paghi il provider a tuo rischio. Ti consigliamo di impostare un limite di spesa per sicurezza."
  commonStep: "Incolla la chiave copiata nel campo \"Chiave API\" delle impostazioni dell'estensione, scegli un modello e fai clic su \"Prova connessione\"."
  openSettings: "Apri impostazioni"
  optionsLink: "Come usare i provider di traduzione"
  modelsHeading: "Modelli disponibili"
  modelsHint: "L'estensione offre i seguenti modelli come preset. La traduzione elabora molti sottotitoli brevi, quindi un modello economico e veloce è più che sufficiente. Ecco come si confronta ciascun modello per qualità, velocità e costo."
  keyHeading: "Ottenere una chiave API"
  billingHeading: "Prezzi e pagamento"
  limitHeading: "Controllare la spesa"
  models:
    gemini31FlashLite: "Velocità: Alta | Precisione: Media | Costo: Basso | La precisione è più che sufficiente per la traduzione. Consigliato se non sei sicuro."
    gemini35FlashLite: "Velocità: Alta | Precisione: Alta | Costo: Media | Il successore della serie 3.1, con una precisione nettamente superiore ma un costo leggermente più alto."
    gemma431bIt: "Velocità: Basso | Precisione: Basso | Costo: Gratis | Utilizzabile nel piano gratuito. La scelta quando vuoi soprattutto contenere i costi."
    gpt54Mini: "Velocità: Media | Precisione: Alta | Costo: Alta | Il costo è alto, quindi adatto quando dai priorità alla qualità."
    gpt54Nano: "Velocità: Media | Precisione: Media | Costo: Basso | Più economico di mini, ma pratico per la traduzione."
    deepseekV4Flash: "Velocità: Media | Precisione: Alta | Costo: Basso | Abbastanza economico, eppure con precisione alta. La scelta migliore quando conta il costo."
    qwen36Flash: "Velocità: Alta | Precisione: Media | Costo: Basso | Economico, e anche la precisione è discreta."
  gemini:
    tagline: "Gemini è disponibile, oltre alla versione gratuita Gemma. Consigliato se non sai quale scegliere."
    step1: "Apri Google AI Studio e accedi con il tuo account Google."
    step2: "Fai clic su \"Crea chiave API\", assegna un nome alla chiave, scegli un progetto (o usa \"Crea progetto\"), quindi fai clic su \"Crea chiave\"."
    step3: "Copia la chiave API mostrata."
    note: "Il piano gratuito ha limiti di frequenza, ma di solito è sufficiente per seguire le lezioni."
    billing: "Nel piano gratuito non servono dati di pagamento. Abilitare la fatturazione allenta i limiti di frequenza anche per i modelli gratuiti, ma attenzione: la fatturazione è prepagata e la chiave API smette di funzionare finché non acquisti crediti. Per abilitare la fatturazione, usa \"Configura fatturazione\" nella pagina Fatturazione per registrare i dati di pagamento, poi acquista crediti con \"Acquista crediti\" (l'importo minimo è mostrato a schermo)."
    limit: "Nella pagina Spesa, \"Limite di spesa mensile\" imposta un limite di utilizzo mensile. Usa \"Modifica limite di spesa\" per impostare l'importo."
  openai:
    tagline: "I modelli ChatGPT sono disponibili. Devi acquistare credito in anticipo."
    step1: "Accedi a OpenAI Platform e apri la pagina API keys."
    step2: "Fai clic su \"Create new secret key\" e assegna un nome qualsiasi."
    step3: "Copia la chiave. Viene mostrata una sola volta, quindi copiala subito."
    note: "È separato da un piano ChatGPT a pagamento."
    billing: "Devi acquistare credito in anticipo. Nella pagina Billing, registra un metodo di pagamento tramite \"Add payment details\", poi acquista credito tramite \"Add to credit balance\"."
    limit: "Nella pagina Limits, usa \"Edit spend limit\" per impostare un limite di utilizzo mensile."
  openrouter:
    tagline: "Sono disponibili molti modelli. Devi acquistare crediti in anticipo."
    step1: "Accedi a OpenRouter e apri la pagina API keys."
    step2: "Fai clic su \"New Key\", assegna un nome qualsiasi e fai clic su \"Create\". Anche il limite di spesa descritto di seguito si inserisce qui."
    step3: "Copia la chiave. Viene mostrata una sola volta, quindi copiala subito."
    note: "La priorità dei provider può essere regolata nelle impostazioni dell'estensione."
    billing: "Devi acquistare crediti in anticipo. Nella pagina Credits, fai clic su \"Add Credits\", inserisci un importo e conferma con \"Purchase\"."
    limit: "Quando crei una chiave, inserisci un importo in \"Credit limit\" e scegli un periodo in \"Reset limit every...\" per impostare un tetto di utilizzo per periodo."

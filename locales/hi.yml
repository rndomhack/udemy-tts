guide:
  title: "अनुवाद प्रदाताओं का उपयोग कैसे करें"
  intro: "अनुवाद जनरेटिव AI का उपयोग करता है। नीचे दिए गए प्रदाताओं में से एक चुनें, API कुंजी प्राप्त करें और उसे एक्सटेंशन की सेटिंग में सेट करें — इसमें बस कुछ मिनट लगते हैं।"
  privacy: "आपकी API कुंजी केवल आपके ब्राउज़र में संग्रहीत होती है और केवल आपके चुने गए प्रदाता को ही भेजी जाती है।"
  disclaimer: "प्रदाता का उपयोग और भुगतान आपके अपने जोखिम पर है। सावधानी के तौर पर हम खर्च सीमा सेट करने की सलाह देते हैं।"
  commonStep: "कॉपी की गई कुंजी को एक्सटेंशन सेटिंग के \"API कुंजी\" फ़ील्ड में पेस्ट करें, एक मॉडल चुनें और \"कनेक्शन जाँचें\" पर क्लिक करें।"
  openSettings: "सेटिंग खोलें"
  optionsLink: "अनुवाद प्रदाताओं का उपयोग कैसे करें"
  modelsHeading: "उपलब्ध मॉडल"
  modelsHint: "एक्सटेंशन निम्नलिखित मॉडल प्रीसेट के रूप में प्रदान करता है। अनुवाद कई छोटे सबटाइटल संसाधित करता है, इसलिए सस्ता और तेज़ मॉडल काफ़ी है। यहाँ बताया गया है कि प्रत्येक मॉडल गुणवत्ता, गति और लागत में कैसा है।"
  keyHeading: "API कुंजी प्राप्त करना"
  billingHeading: "मूल्य और भुगतान"
  limitHeading: "अपने खर्च को नियंत्रित करना"
  models:
    gemini31FlashLite: "गति: उच्च | सटीकता: मध्यम | लागत: कम | सटीकता अनुवाद के लिए पर्याप्त है। यदि अनिश्चित हों तो अनुशंसित।"
    gemini35FlashLite: "गति: उच्च | सटीकता: उच्च | लागत: मध्यम | 3.1 सीरीज़ का उत्तराधिकारी, जिसकी सटीकता काफी बेहतर है, पर लागत थोड़ी अधिक है।"
    gemma431bIt: "गति: कम | सटीकता: कम | लागत: निःशुल्क | निःशुल्क स्तर पर उपयोग योग्य। मुख्यतः लागत कम रखने के लिए उपयुक्त विकल्प।"
    gpt54Mini: "गति: मध्यम | सटीकता: उच्च | लागत: उच्च | लागत अधिक है, इसलिए गुणवत्ता को प्राथमिकता देने पर उपयुक्त।"
    gpt54Nano: "गति: मध्यम | सटीकता: मध्यम | लागत: कम | mini से सस्ता, पर अनुवाद के लिए व्यावहारिक।"
    deepseekV4Flash: "गति: मध्यम | सटीकता: उच्च | लागत: कम | काफी सस्ता, फिर भी सटीकता उच्च है। लागत मायने रखने पर सर्वश्रेष्ठ विकल्प।"
    qwen36Flash: "गति: उच्च | सटीकता: मध्यम | लागत: कम | सस्ता, और सटीकता भी ठीक-ठाक।"
  gemini:
    tagline: "Gemini उपलब्ध है, साथ ही निःशुल्क Gemma भी। यदि आप तय नहीं कर पा रहे तो अनुशंसित।"
    step1: "Google AI Studio खोलें और अपने Google खाते से साइन इन करें।"
    step2: "\"API कुंजी बनाएँ\" पर क्लिक करें, कुंजी को नाम दें, एक प्रोजेक्ट चुनें (या \"प्रोजेक्ट बनाएँ\" का उपयोग करें), फिर \"कुंजी बनाएँ\" पर क्लिक करें।"
    step3: "दिखाई गई API कुंजी कॉपी करें।"
    note: "निःशुल्क स्तर में दर सीमाएँ हैं, पर व्याख्यान देखने के लिए यह आमतौर पर पर्याप्त है।"
    billing: "निःशुल्क स्तर पर भुगतान जानकारी की आवश्यकता नहीं है। बिलिंग सक्षम करने से निःशुल्क मॉडल के लिए भी दर सीमाएँ ढीली हो जाती हैं, पर ध्यान दें: बिलिंग प्रीपेड है, और क्रेडिट खरीदने तक आपकी API कुंजी काम नहीं करती। बिलिंग सक्षम करने के लिए, बिलिंग पेज पर \"बिलिंग सेट करें\" से अपनी भुगतान जानकारी दर्ज करें, फिर \"क्रेडिट खरीदें\" से क्रेडिट खरीदें (न्यूनतम राशि स्क्रीन पर दिखाई जाती है)।"
    limit: "खर्च पेज पर, \"मासिक खर्च सीमा\" मासिक उपयोग सीमा निर्धारित करती है। राशि सेट करने के लिए \"खर्च सीमा संपादित करें\" का उपयोग करें।"
  openai:
    tagline: "ChatGPT मॉडल उपलब्ध हैं। आपको पहले से क्रेडिट खरीदना होगा।"
    step1: "OpenAI Platform में साइन इन करें और API keys पेज खोलें।"
    step2: "\"Create new secret key\" पर क्लिक करें और कोई भी नाम दें।"
    step3: "कुंजी कॉपी करें। यह केवल एक बार दिखाई जाती है, इसलिए तुरंत कॉपी करें।"
    note: "यह सशुल्क ChatGPT प्लान से अलग है।"
    billing: "आपको पहले से क्रेडिट खरीदना होगा। Billing पेज पर, \"Add payment details\" के ज़रिए भुगतान विधि दर्ज करें, फिर \"Add to credit balance\" के ज़रिए क्रेडिट खरीदें।"
    limit: "Limits पेज पर, मासिक उपयोग सीमा सेट करने के लिए \"Edit spend limit\" का उपयोग करें।"
  openrouter:
    tagline: "कई मॉडल उपलब्ध हैं। आपको पहले से क्रेडिट खरीदने होंगे।"
    step1: "OpenRouter में साइन इन करें और API keys पेज खोलें।"
    step2: "\"New Key\" पर क्लिक करें, कोई भी नाम दें और \"Create\" पर क्लिक करें। नीचे बताई गई खर्च सीमा भी यहीं दर्ज की जाती है।"
    step3: "कुंजी कॉपी करें। यह केवल एक बार दिखाई जाती है, इसलिए तुरंत कॉपी करें।"
    note: "प्रदाता प्राथमिकता एक्सटेंशन सेटिंग में समायोजित की जा सकती है।"
    billing: "आपको पहले से क्रेडिट खरीदने होंगे। Credits पेज पर, \"Add Credits\" पर क्लिक करें, एक राशि दर्ज करें और \"Purchase\" से पुष्टि करें।"
    limit: "कुंजी बनाते समय, \"Credit limit\" में एक राशि दर्ज करें और प्रति अवधि उपयोग सीमा सेट करने के लिए \"Reset limit every...\" में एक अवधि चुनें।"

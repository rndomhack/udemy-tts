guide:
  title: "Näin käytät käännöspalveluita"
  intro: "Käännös käyttää generatiivista tekoälyä. Valitse jokin alla olevista palveluntarjoajista, hanki API-avain ja aseta se laajennuksen asetuksiin — se vie vain muutaman minuutin."
  privacy: "API-avaimesi tallennetaan vain selaimeesi ja lähetetään vain valitsemallesi palveluntarjoajalle."
  disclaimer: "Käytät palveluntarjoajaa ja maksat siitä omalla vastuullasi. Suosittelemme asettamaan kulurajan varmuuden vuoksi."
  commonStep: "Liitä kopioitu avain laajennuksen asetusten \"API-avain\"-kenttään, valitse malli ja napsauta \"Testaa yhteys\"."
  openSettings: "Avaa asetukset"
  optionsLink: "Näin käytät käännöspalveluita"
  modelsHeading: "Käytettävissä olevat mallit"
  modelsHint: "Laajennus tarjoaa seuraavat mallit esiasetuksina. Käännös käsittelee monia lyhyitä tekstityksiä, joten halpa ja nopea malli riittää hyvin. Näin kukin malli vertautuu laadun, nopeuden ja hinnan suhteen."
  keyHeading: "API-avaimen hankkiminen"
  billingHeading: "Hinnoittelu ja maksaminen"
  limitHeading: "Kulujen hallinta"
  models:
    gemini31FlashLite: "Nopeus: Korkea | Tarkkuus: Keskitaso | Hinta: Matala | Tarkkuus riittää hyvin käännökseen. Suositeltu, jos et ole varma."
    gemini35FlashLite: "Nopeus: Korkea | Tarkkuus: Korkea | Hinta: Keskitaso | 3.1-sarjan seuraaja huomattavasti korkeammalla tarkkuudella, mutta hieman korkeammalla hinnalla."
    gemma431bIt: "Nopeus: Matala | Tarkkuus: Matala | Hinta: Ilmainen | Käytettävissä ilmaisella tasolla. Valinta silloin, kun haluat ennen kaikkea pitää kustannukset kurissa."
    gpt54Mini: "Nopeus: Keskitaso | Tarkkuus: Korkea | Hinta: Korkea | Hinta on korkea, joten sopii, kun priorisoit laatua."
    gpt54Nano: "Nopeus: Keskitaso | Tarkkuus: Keskitaso | Hinta: Matala | Halvempi kuin mini, mutta käytännöllinen käännökseen."
    deepseekV4Flash: "Nopeus: Keskitaso | Tarkkuus: Korkea | Hinta: Matala | Melko halpa, silti tarkkuus on korkea. Paras valinta, kun hinnalla on merkitystä."
    qwen36Flash: "Nopeus: Korkea | Tarkkuus: Keskitaso | Hinta: Matala | Edullinen, ja tarkkuuskin on kohtuullinen."
  gemini:
    tagline: "Gemini on käytettävissä, samoin ilmainen Gemma. Suositeltu, jos et ole varma, minkä valitsisit."
    step1: "Avaa Google AI Studio ja kirjaudu sisään Google-tililläsi."
    step2: "Napsauta \"Luo API-avain\", nimeä avain, valitse projekti (tai käytä \"Luo projekti\") ja napsauta sitten \"Luo avain\"."
    step3: "Kopioi näytetty API-avain."
    note: "Ilmaisella tasolla on käyttörajoituksia, mutta se riittää yleensä luentojen katseluun."
    billing: "Ilmaisella tasolla ei tarvita maksutietoja. Laskutuksen käyttöönotto lieventää käyttörajoituksia myös ilmaisille malleille, mutta huomaa: laskutus on ennakkomaksullinen, ja API-avain lakkaa toimimasta, kunnes ostat krediittejä. Ota laskutus käyttöön valitsemalla \"Määritä laskutus\" Laskutus-sivulla ja rekisteröi maksutietosi, ja osta sitten krediittejä valinnalla \"Osta krediittejä\" (vähimmäissumma näkyy näytöllä)."
    limit: "Kulut-sivulla \"Kuukausittainen kuluraja\" asettaa kuukausittaisen käyttörajan. Aseta summa kohdasta \"Muokkaa kulurajaa\"."
  openai:
    tagline: "ChatGPT-mallit ovat käytettävissä. Sinun on ostettava saldoa etukäteen."
    step1: "Kirjaudu OpenAI Platformiin ja avaa API keys -sivu."
    step2: "Napsauta \"Create new secret key\" ja anna sille mikä tahansa nimi."
    step3: "Kopioi avain. Se näytetään vain kerran, joten kopioi se heti."
    note: "Tämä on erillinen maksullisesta ChatGPT-tilauksesta."
    billing: "Sinun on ostettava saldoa etukäteen. Rekisteröi maksutapa Billing-sivulla kohdasta \"Add payment details\" ja osta sitten saldoa kohdasta \"Add to credit balance\"."
    limit: "Aseta kuukausittainen käyttöraja Limits-sivulla kohdasta \"Edit spend limit\"."
  openrouter:
    tagline: "Monia malleja on käytettävissä. Sinun on ostettava krediittejä etukäteen."
    step1: "Kirjaudu OpenRouteriin ja avaa API keys -sivu."
    step2: "Napsauta \"New Key\", anna sille mikä tahansa nimi ja napsauta \"Create\". Alla kuvattu kuluraja syötetään myös tässä."
    step3: "Kopioi avain. Se näytetään vain kerran, joten kopioi se heti."
    note: "Palveluntarjoajien prioriteettia voi säätää laajennuksen asetuksissa."
    billing: "Sinun on ostettava krediittejä etukäteen. Napsauta Credits-sivulla \"Add Credits\", syötä summa ja vahvista kohdasta \"Purchase\"."
    limit: "Avainta luodessasi syötä summa kohtaan \"Credit limit\" ja valitse jakso kohdasta \"Reset limit every...\" asettaaksesi käyttörajan jaksoa kohden."

guide:
  title: "Çeviri sağlayıcıları nasıl kullanılır"
  intro: "Çeviri, üretken yapay zeka kullanır. Aşağıdaki sağlayıcılardan birini seçin, bir API anahtarı alın ve eklenti ayarlarına girin — yalnızca birkaç dakika sürer."
  privacy: "API anahtarınız yalnızca tarayıcınızda saklanır ve yalnızca seçtiğiniz sağlayıcıya gönderilir."
  disclaimer: "Sağlayıcıyı kendi sorumluluğunuzda kullanır ve ödersiniz. Her ihtimale karşı bir harcama limiti belirlemenizi öneririz."
  commonStep: "Kopyaladığınız anahtarı eklenti ayarlarındaki \"API anahtarı\" alanına yapıştırın, bir model seçin ve \"Bağlantıyı test et\"e tıklayın."
  openSettings: "Ayarları aç"
  optionsLink: "Çeviri sağlayıcıları nasıl kullanılır"
  modelsHeading: "Kullanılabilir modeller"
  modelsHint: "Eklenti aşağıdaki modelleri hazır ayar olarak sunar. Çeviri, çok sayıda kısa altyazıyı işler, bu yüzden ucuz ve hızlı bir model fazlasıyla yeterlidir. İşte her modelin kalite, hız ve maliyet açısından karşılaştırması."
  keyHeading: "API anahtarı alma"
  billingHeading: "Fiyatlandırma ve ödeme"
  limitHeading: "Harcamanızı kontrol etme"
  models:
    gemini31FlashLite: "Hız: Yüksek | Doğruluk: Orta | Maliyet: Düşük | Doğruluk çeviri için fazlasıyla yeterli. Kararsızsanız önerilir."
    gemini35FlashLite: "Hız: Yüksek | Doğruluk: Yüksek | Maliyet: Orta | 3.1 serisinin halefi, belirgin şekilde daha yüksek doğrulukla, ancak biraz daha yüksek maliyetle."
    gemma431bIt: "Hız: Düşük | Doğruluk: Düşük | Maliyet: Ücretsiz | Ücretsiz katmanda kullanılabilir. Özellikle maliyetleri düşük tutmak istediğinizde tercih edilir."
    gpt54Mini: "Hız: Orta | Doğruluk: Yüksek | Maliyet: Yüksek | Maliyet yüksek, bu yüzden kaliteyi önceliklendirdiğinizde uygundur."
    gpt54Nano: "Hız: Orta | Doğruluk: Orta | Maliyet: Düşük | mini'den daha ucuz, ancak çeviri için pratiktir."
    deepseekV4Flash: "Hız: Orta | Doğruluk: Yüksek | Maliyet: Düşük | Oldukça ucuz, yine de doğruluğu yüksek. Maliyet önemliyken en iyi tercih."
    qwen36Flash: "Hız: Yüksek | Doğruluk: Orta | Maliyet: Düşük | Ucuz, ve doğruluğu da fena değil."
  gemini:
    tagline: "Gemini mevcut, ayrıca ücretsiz Gemma var. Hangisini seçeceğinizden emin değilseniz önerilir."
    step1: "Google AI Studio'yu açın ve Google hesabınızla oturum açın."
    step2: "\"API anahtarı oluştur\"a tıklayın, anahtara bir ad verin, bir proje seçin (veya \"Proje oluştur\"u kullanın) ve ardından \"Anahtar oluştur\"a tıklayın."
    step3: "Gösterilen API anahtarını kopyalayın."
    note: "Ücretsiz katmanın hız sınırları vardır, ancak dersleri izlemek için genellikle yeterlidir."
    billing: "Ücretsiz katmanda ödeme bilgisi gerekmez. Faturalandırmayı etkinleştirmek ücretsiz modeller için bile hız sınırlarını gevşetir, ancak dikkat: faturalandırma ön ödemelidir ve kredi satın alana kadar API anahtarınız çalışmaz. Faturalandırmayı etkinleştirmek için Faturalandırma sayfasındaki \"Faturalandırmayı ayarla\" ile ödeme bilgilerinizi kaydedin, ardından \"Kredi satın al\" ile kredi satın alın (asgari tutar ekranda gösterilir)."
    limit: "Harcama sayfasında \"Aylık harcama üst sınırı\" aylık bir kullanım limiti belirler. Tutarı ayarlamak için \"Harcama üst sınırını düzenle\"yi kullanın."
  openai:
    tagline: "ChatGPT modelleri mevcut. Önceden kredi satın almanız gerekir."
    step1: "OpenAI Platform'a oturum açın ve API keys sayfasını açın."
    step2: "\"Create new secret key\"e tıklayın ve herhangi bir ad verin."
    step3: "Anahtarı kopyalayın. Yalnızca bir kez gösterilir, bu yüzden hemen kopyalayın."
    note: "Bu, ücretli bir ChatGPT planından ayrıdır."
    billing: "Önceden kredi satın almanız gerekir. Billing sayfasında \"Add payment details\" ile bir ödeme yöntemi kaydedin, ardından \"Add to credit balance\" ile kredi satın alın."
    limit: "Limits sayfasında aylık bir kullanım limiti belirlemek için \"Edit spend limit\"i kullanın."
  openrouter:
    tagline: "Birçok model mevcut. Önceden kredi satın almanız gerekir."
    step1: "OpenRouter'a oturum açın ve API keys sayfasını açın."
    step2: "\"New Key\"e tıklayın, herhangi bir ad verin ve \"Create\"e tıklayın. Aşağıda açıklanan harcama limiti de burada girilir."
    step3: "Anahtarı kopyalayın. Yalnızca bir kez gösterilir, bu yüzden hemen kopyalayın."
    note: "Sağlayıcı önceliği eklenti ayarlarından ince ayarlanabilir."
    billing: "Önceden kredi satın almanız gerekir. Credits sayfasında \"Add Credits\"e tıklayın, bir tutar girin ve \"Purchase\" ile onaylayın."
    limit: "Bir anahtar oluştururken \"Credit limit\" alanına bir tutar girin ve \"Reset limit every...\" içinden bir dönem seçerek dönem başına bir kullanım sınırı belirleyin."

guide:
  title: "Cách sử dụng các nhà cung cấp dịch"
  intro: "Tính năng dịch sử dụng AI tạo sinh. Hãy chọn một trong các nhà cung cấp dưới đây, lấy khóa API và nhập vào cài đặt của tiện ích — chỉ mất vài phút."
  privacy: "Khóa API chỉ được lưu trong trình duyệt của bạn và chỉ được gửi tới nhà cung cấp bạn đã chọn."
  disclaimer: "Bạn tự chịu trách nhiệm khi sử dụng và thanh toán cho nhà cung cấp. Để phòng xa, chúng tôi khuyên bạn nên đặt hạn mức chi tiêu."
  commonStep: "Dán khóa đã sao chép vào ô \"Khóa API\" trong cài đặt tiện ích, chọn mô hình rồi nhấp \"Kiểm tra kết nối\"."
  openSettings: "Mở cài đặt"
  optionsLink: "Cách sử dụng các nhà cung cấp dịch"
  modelsHeading: "Các mô hình khả dụng"
  modelsHint: "Tiện ích cung cấp các mô hình sau dưới dạng cài đặt sẵn. Việc dịch xử lý nhiều phụ đề ngắn, nên một mô hình rẻ và nhanh là đủ. Dưới đây là so sánh từng mô hình về chất lượng, tốc độ và chi phí."
  keyHeading: "Lấy khóa API"
  billingHeading: "Giá và thanh toán"
  limitHeading: "Kiểm soát chi tiêu"
  models:
    gemini31FlashLite: "Tốc độ: Cao | Độ chính xác: Trung bình | Chi phí: Thấp | Độ chính xác thừa đủ để dịch. Nên chọn nếu bạn chưa chắc."
    gemini35FlashLite: "Tốc độ: Cao | Độ chính xác: Cao | Chi phí: Trung bình | Phiên bản kế nhiệm của dòng 3.1, với độ chính xác cao hơn rõ rệt nhưng chi phí cao hơn một chút."
    gemma431bIt: "Tốc độ: Thấp | Độ chính xác: Thấp | Chi phí: Miễn phí | Dùng được ở gói miễn phí. Lựa chọn khi bạn chủ yếu muốn giảm chi phí."
    gpt54Mini: "Tốc độ: Trung bình | Độ chính xác: Cao | Chi phí: Cao | Chi phí cao, nên phù hợp khi bạn ưu tiên chất lượng."
    gpt54Nano: "Tốc độ: Trung bình | Độ chính xác: Trung bình | Chi phí: Thấp | Rẻ hơn mini, nhưng thực dụng cho việc dịch."
    deepseekV4Flash: "Tốc độ: Trung bình | Độ chính xác: Cao | Chi phí: Thấp | Khá rẻ nhưng độ chính xác cao. Lựa chọn hàng đầu khi chi phí quan trọng."
    qwen36Flash: "Tốc độ: Cao | Độ chính xác: Trung bình | Chi phí: Thấp | Rẻ, và độ chính xác cũng khá tốt."
  gemini:
    tagline: "Có sẵn Gemini, cùng với Gemma miễn phí. Nên chọn nếu bạn chưa chắc dùng gì."
    step1: "Mở Google AI Studio và đăng nhập bằng tài khoản Google của bạn."
    step2: "Nhấp \"Tạo khóa API\", đặt tên khóa, chọn một dự án (hoặc dùng \"Tạo dự án\"), rồi nhấp \"Tạo khóa\"."
    step3: "Sao chép khóa API được hiển thị."
    note: "Gói miễn phí có giới hạn tốc độ, nhưng thường đủ để xem bài giảng."
    billing: "Ở gói miễn phí không cần thông tin thanh toán. Bật thanh toán sẽ nới lỏng giới hạn tốc độ ngay cả với các mô hình miễn phí, nhưng lưu ý: đây là hình thức trả trước, và khóa API sẽ ngừng hoạt động cho đến khi bạn mua tín dụng. Để bật thanh toán, dùng \"Thiết lập thanh toán\" trên trang \"Thanh toán\" để đăng ký thông tin thanh toán, sau đó mua tín dụng bằng \"Mua tín dụng\" (số tiền tối thiểu hiển thị trên màn hình)."
    limit: "Trên trang \"Chi tiêu\", \"Hạn mức chi tiêu hàng tháng\" đặt giới hạn sử dụng theo tháng. Dùng \"Chỉnh sửa hạn mức chi tiêu\" để đặt số tiền."
  openai:
    tagline: "Có sẵn các mô hình ChatGPT. Bạn cần mua credit trước."
    step1: "Đăng nhập OpenAI Platform và mở trang API keys."
    step2: "Nhấp \"Create new secret key\" và đặt tên tùy ý."
    step3: "Sao chép khóa. Khóa chỉ hiển thị một lần nên hãy sao chép ngay."
    note: "Đây là khoản riêng, tách biệt với gói ChatGPT trả phí."
    billing: "Bạn cần mua credit trước. Trên trang Billing, đăng ký phương thức thanh toán qua \"Add payment details\", rồi mua credit qua \"Add to credit balance\"."
    limit: "Trên trang Limits, dùng \"Edit spend limit\" để đặt giới hạn sử dụng hàng tháng."
  openrouter:
    tagline: "Có sẵn nhiều mô hình. Bạn cần mua credit trước."
    step1: "Đăng nhập OpenRouter và mở trang API keys."
    step2: "Nhấp \"New Key\", đặt tên tùy ý, rồi nhấp \"Create\". Hạn mức chi tiêu mô tả bên dưới cũng được nhập tại đây."
    step3: "Sao chép khóa. Khóa chỉ hiển thị một lần nên hãy sao chép ngay."
    note: "Mức ưu tiên nhà cung cấp có thể điều chỉnh trong cài đặt tiện ích."
    billing: "Bạn cần mua credit trước. Trên trang Credits, nhấp \"Add Credits\", nhập số tiền, rồi xác nhận bằng \"Purchase\"."
    limit: "Khi tạo khóa, nhập số tiền vào \"Credit limit\" và chọn chu kỳ trong \"Reset limit every...\" để đặt hạn mức sử dụng cho mỗi chu kỳ."

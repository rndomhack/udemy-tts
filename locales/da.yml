guide:
  title: "Sådan bruger du oversættelsesudbydere"
  intro: "Oversættelse bruger generativ AI. Vælg en af udbyderne nedenfor, hent en API-nøgle, og angiv den i udvidelsens indstillinger — det tager kun få minutter."
  privacy: "Din API-nøgle gemmes kun i din browser og sendes kun til den udbyder, du har valgt."
  disclaimer: "Du bruger og betaler for udbyderen på eget ansvar. Vi anbefaler at sætte en forbrugsgrænse for en sikkerheds skyld."
  commonStep: "Indsæt den kopierede nøgle i feltet \"API-nøgle\" i udvidelsens indstillinger, vælg en model, og klik på \"Test forbindelse\"."
  openSettings: "Åbn indstillinger"
  optionsLink: "Sådan bruger du oversættelsesudbydere"
  modelsHeading: "Tilgængelige modeller"
  modelsHint: "Udvidelsen tilbyder følgende modeller som forudindstillinger. Oversættelse behandler mange korte undertekster, så en billig og hurtig model er rigeligt. Her er, hvordan hver model klarer sig på kvalitet, hastighed og pris."
  keyHeading: "Sådan får du en API-nøgle"
  billingHeading: "Priser og betaling"
  limitHeading: "Styr dit forbrug"
  models:
    gemini31FlashLite: "Hastighed: Høj | Nøjagtighed: Middel | Pris: Lav | Nøjagtigheden er rigelig til oversættelse. Anbefales, hvis du er i tvivl."
    gemini35FlashLite: "Hastighed: Høj | Nøjagtighed: Høj | Pris: Middel | Efterfølgeren til 3.1-serien med markant højere nøjagtighed, men lidt højere pris."
    gemma431bIt: "Hastighed: Lav | Nøjagtighed: Lav | Pris: Gratis | Kan bruges på det gratis niveau. Valget, når du primært vil holde omkostningerne nede."
    gpt54Mini: "Hastighed: Middel | Nøjagtighed: Høj | Pris: Høj | Prisen er høj, så den passer, når du prioriterer kvalitet."
    gpt54Nano: "Hastighed: Middel | Nøjagtighed: Middel | Pris: Lav | Billigere end mini, men praktisk til oversættelse."
    deepseekV4Flash: "Hastighed: Middel | Nøjagtighed: Høj | Pris: Lav | Ret billig, men med høj nøjagtighed. Det bedste valg, når prisen betyder noget."
    qwen36Flash: "Hastighed: Høj | Nøjagtighed: Middel | Pris: Lav | Billig, og nøjagtigheden er også rimelig."
  gemini:
    tagline: "Gemini er tilgængelig, plus den gratis Gemma. Anbefales, hvis du er i tvivl om, hvad du skal vælge."
    step1: "Åbn Google AI Studio og log ind med din Google-konto."
    step2: "Klik på \"Opret API-nøgle\", navngiv nøglen, vælg et projekt (eller brug \"Opret projekt\"), og klik derefter på \"Opret nøgle\"."
    step3: "Kopiér den viste API-nøgle."
    note: "Det gratis niveau har hastighedsgrænser, men det er normalt nok til at se forelæsninger."
    billing: "Der kræves ingen betalingsoplysninger på det gratis niveau. Aktivering af fakturering lemper hastighedsgrænserne selv for gratis modeller, men bemærk: faktureringen er forudbetalt, og din API-nøgle holder op med at virke, indtil du køber kredit. For at aktivere fakturering skal du bruge \"Konfigurer fakturering\" på fakturasiden til at registrere dine betalingsoplysninger og derefter købe kredit med \"Køb kredit\" (minimumsbeløbet vises på skærmen)."
    limit: "På forbrugssiden angiver \"Månedligt forbrugsloft\" en månedlig forbrugsgrænse. Brug \"Rediger forbrugsloft\" for at angive beløbet."
  openai:
    tagline: "ChatGPT-modeller er tilgængelige. Du skal købe kredit på forhånd."
    step1: "Log ind på OpenAI Platform og åbn siden API keys."
    step2: "Klik på \"Create new secret key\", og giv den et vilkårligt navn."
    step3: "Kopiér nøglen. Den vises kun én gang, så kopiér den med det samme."
    note: "Dette er adskilt fra et betalt ChatGPT-abonnement."
    billing: "Du skal købe kredit på forhånd. På siden Billing skal du registrere en betalingsmetode via \"Add payment details\" og derefter købe kredit via \"Add to credit balance\"."
    limit: "På siden Limits skal du bruge \"Edit spend limit\" for at angive en månedlig forbrugsgrænse."
  openrouter:
    tagline: "Mange modeller er tilgængelige. Du skal købe kreditter på forhånd."
    step1: "Log ind på OpenRouter og åbn siden API keys."
    step2: "Klik på \"New Key\", giv den et vilkårligt navn, og klik på \"Create\". Den forbrugsgrænse, der beskrives nedenfor, angives også her."
    step3: "Kopiér nøglen. Den vises kun én gang, så kopiér den med det samme."
    note: "Udbyderprioriteten kan justeres i udvidelsens indstillinger."
    billing: "Du skal købe kreditter på forhånd. På siden Credits skal du klikke på \"Add Credits\", angive et beløb og bekræfte med \"Purchase\"."
    limit: "Når du opretter en nøgle, skal du angive et beløb i \"Credit limit\" og vælge en periode i \"Reset limit every...\" for at angive en forbrugsgrænse pr. periode."

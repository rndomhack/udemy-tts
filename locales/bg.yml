guide:
  title: "Как да използвате доставчиците на превод"
  intro: "Преводът използва генеративен ИИ. Изберете един от доставчиците по-долу, вземете API ключ и го задайте в настройките на разширението — отнема само няколко минути."
  privacy: "Вашият API ключ се съхранява само във вашия браузър и се изпраща само на избрания от вас доставчик."
  disclaimer: "Използвате доставчика и плащате за него на свой риск. Препоръчваме да зададете лимит на разходите за всеки случай."
  commonStep: "Поставете копирания ключ в полето „API ключ“ в настройките на разширението, изберете модел и натиснете „Проверка на връзката“."
  openSettings: "Отвори настройките"
  optionsLink: "Как да използвате доставчиците на превод"
  modelsHeading: "Налични модели"
  modelsHint: "Разширението предлага следните модели като предварителни настройки. Преводът обработва много кратки субтитри, затова евтин и бърз модел е напълно достатъчен. Ето как всеки модел се сравнява по качество, скорост и цена."
  keyHeading: "Получаване на API ключ"
  billingHeading: "Цени и плащане"
  limitHeading: "Контрол на разходите"
  models:
    gemini31FlashLite: "Скорост: Висока | Точност: Средна | Цена: Ниска | Точността е достатъчна за превод. Препоръчва се, ако не сте сигурни."
    gemini35FlashLite: "Скорост: Висока | Точност: Висока | Цена: Средна | Наследник на серията 3.1 със значително по-висока точност, но малко по-скъпа."
    gemma431bIt: "Скорост: Ниска | Точност: Ниска | Цена: Безплатно | Може да се използва в безплатното ниво. Изборът, когато основно искате да намалите разходите."
    gpt54Mini: "Скорост: Средна | Точност: Висока | Цена: Висока | Цената е висока, затова е подходящ, когато качеството е приоритет."
    gpt54Nano: "Скорост: Средна | Точност: Средна | Цена: Ниска | По-евтин от mini, но практичен за превод."
    deepseekV4Flash: "Скорост: Средна | Точност: Висока | Цена: Ниска | Доста евтин, но с висока точност. Най-добрият избор, когато цената има значение."
    qwen36Flash: "Скорост: Висока | Точност: Средна | Цена: Ниска | Евтин, а точността е сравнително добра."
  gemini:
    tagline: "Gemini е наличен, плюс безплатният Gemma. Препоръчва се, ако не сте сигурни кой да изберете."
    step1: "Отворете Google AI Studio и влезте с вашия Google акаунт."
    step2: "Натиснете „Създаване на API ключ“, дайте име на ключа, изберете проект (или използвайте „Създаване на проект“), след което натиснете „Създаване на ключ“."
    step3: "Копирайте показания API ключ."
    note: "Безплатното ниво има ограничения на честотата, но обикновено е достатъчно за гледане на лекции."
    billing: "В безплатното ниво не е нужна информация за плащане. Активирането на таксуването облекчава ограниченията на честотата дори за безплатните модели, но имайте предвид: таксуването е предплатено и API ключът спира да работи, докато не купите кредити. За да активирате таксуването, използвайте „Настройка на таксуването“ на страницата за таксуване, за да въведете информацията си за плащане, след което купете кредити чрез „Купуване на кредити“ (минималната сума се показва на екрана)."
    limit: "На страницата за разходи „Месечен лимит на разходите“ задава месечен лимит на потреблението. Използвайте „Редактиране на лимита на разходите“, за да зададете сумата."
  openai:
    tagline: "Моделите на ChatGPT са налични. Трябва да закупите кредит предварително."
    step1: "Влезте в OpenAI Platform и отворете страницата API keys."
    step2: "Натиснете „Create new secret key“ и задайте произволно име."
    step3: "Копирайте ключа. Показва се само веднъж, затова го копирайте веднага."
    note: "Това е отделно от платения план на ChatGPT."
    billing: "Трябва да закупите кредит предварително. На страницата Billing регистрирайте метод на плащане чрез „Add payment details“, след което купете кредит чрез „Add to credit balance“."
    limit: "На страницата Limits използвайте „Edit spend limit“, за да зададете месечен лимит на потреблението."
  openrouter:
    tagline: "Налични са много модели. Трябва да закупите кредити предварително."
    step1: "Влезте в OpenRouter и отворете страницата API keys."
    step2: "Натиснете „New Key“, задайте произволно име и натиснете „Create“. Описаният по-долу лимит на разходите също се въвежда тук."
    step3: "Копирайте ключа. Показва се само веднъж, затова го копирайте веднага."
    note: "Приоритетът на доставчиците може да се настрои в настройките на разширението."
    billing: "Трябва да закупите кредити предварително. На страницата Credits натиснете „Add Credits“, въведете сума и потвърдете с „Purchase“."
    limit: "При създаване на ключ въведете сума в „Credit limit“ и изберете период в „Reset limit every...“, за да зададете лимит на потреблението за период."

guide:
  title: "איך להשתמש בספקי תרגום"
  intro: "התרגום משתמש בבינה מלאכותית יוצרת. בחרו אחד מהספקים שלהלן, השיגו מפתח API והזינו אותו בהגדרות התוסף — זה לוקח רק כמה דקות."
  privacy: "מפתח ה-API שלכם נשמר רק בדפדפן שלכם ונשלח רק לספק שבחרתם."
  disclaimer: "השימוש בספק והתשלום עליו הם באחריותכם בלבד. אנו ממליצים להגדיר מגבלת הוצאה ליתר ביטחון."
  commonStep: "הדביקו את המפתח שהועתק בשדה \"מפתח API\" בהגדרות התוסף, בחרו מודל ולחצו על \"בדיקת חיבור\"."
  openSettings: "פתיחת הגדרות"
  optionsLink: "איך להשתמש בספקי תרגום"
  modelsHeading: "מודלים זמינים"
  modelsHint: "התוסף מציע את המודלים הבאים כהגדרות מוכנות. התרגום מעבד כתוביות קצרות רבות, ולכן מודל זול ומהיר מספיק בהחלט. כך משתווה כל מודל מבחינת איכות, מהירות ועלות."
  keyHeading: "השגת מפתח API"
  billingHeading: "תמחור ותשלום"
  limitHeading: "שליטה בהוצאות"
  models:
    gemini31FlashLite: "מהירות: גבוהה | דיוק: בינוני | עלות: נמוכה | הדיוק מספיק בהחלט לתרגום. מומלץ אם אינכם בטוחים."
    gemini35FlashLite: "מהירות: גבוהה | דיוק: גבוהה | עלות: בינוני | היורש של סדרת 3.1 עם דיוק גבוה משמעותית, אך במחיר מעט גבוה יותר."
    gemma431bIt: "מהירות: נמוכה | דיוק: נמוכה | עלות: חינם | ניתן לשימוש ברמה החינמית. הבחירה כאשר רוצים בעיקר לצמצם עלויות."
    gpt54Mini: "מהירות: בינוני | דיוק: גבוהה | עלות: גבוהה | העלות גבוהה, ולכן מתאים כאשר מעדיפים איכות."
    gpt54Nano: "מהירות: בינוני | דיוק: בינוני | עלות: נמוכה | זול יותר מ-mini, אך מעשי לתרגום."
    deepseekV4Flash: "מהירות: בינוני | דיוק: גבוהה | עלות: נמוכה | זול למדי, עם דיוק גבוה. הבחירה המובילה כשהעלות חשובה."
    qwen36Flash: "מהירות: גבוהה | דיוק: בינוני | עלות: נמוכה | זול, והדיוק גם סביר."
  gemini:
    tagline: "Gemini זמין, וכן Gemma החינמי. מומלץ אם אינכם בטוחים במה לבחור."
    step1: "פתחו את Google AI Studio והתחברו עם חשבון Google שלכם."
    step2: "לחצו על \"יצירת מפתח API\", תנו שם למפתח, בחרו פרויקט (או השתמשו ב\"יצירת פרויקט\"), ואז לחצו על \"יצירת מפתח\"."
    step3: "העתיקו את מפתח ה-API המוצג."
    note: "לרמה החינמית יש מגבלות קצב, אך היא בדרך כלל מספיקה לצפייה בהרצאות."
    billing: "ברמה החינמית אין צורך בפרטי תשלום. הפעלת החיוב מקלה על מגבלות הקצב גם עבור מודלים חינמיים, אך שימו לב: החיוב הוא בתשלום מראש, ומפתח ה-API יפסיק לפעול עד שתרכשו קרדיטים. כדי להפעיל חיוב, השתמשו ב\"הגדרת חיוב\" בעמוד החיוב כדי לרשום את פרטי התשלום, ולאחר מכן רכשו קרדיטים באמצעות \"רכישת קרדיטים\" (הסכום המינימלי מוצג במסך)."
    limit: "בעמוד ההוצאות, \"תקרת הוצאה חודשית\" קובעת מגבלת שימוש חודשית. השתמשו ב\"עריכת תקרת ההוצאה\" כדי לקבוע את הסכום."
  openai:
    tagline: "מודלים של ChatGPT זמינים. עליכם לרכוש יתרה מראש."
    step1: "התחברו ל-OpenAI Platform ופתחו את דף API keys."
    step2: "לחצו על \"Create new secret key\" ותנו שם כלשהו."
    step3: "העתיקו את המפתח. הוא מוצג פעם אחת בלבד, לכן העתיקו אותו מיד."
    note: "זה נפרד ממנוי ChatGPT בתשלום."
    billing: "עליכם לרכוש יתרה מראש. בדף Billing, רשמו אמצעי תשלום דרך \"Add payment details\", ואז רכשו יתרה דרך \"Add to credit balance\"."
    limit: "בדף Limits, השתמשו ב\"Edit spend limit\" כדי לקבוע מגבלת שימוש חודשית."
  openrouter:
    tagline: "מודלים רבים זמינים. עליכם לרכוש קרדיטים מראש."
    step1: "התחברו ל-OpenRouter ופתחו את דף API keys."
    step2: "לחצו על \"New Key\", תנו שם כלשהו ולחצו על \"Create\". מגבלת ההוצאה המתוארת להלן מוזנת גם כאן."
    step3: "העתיקו את המפתח. הוא מוצג פעם אחת בלבד, לכן העתיקו אותו מיד."
    note: "את עדיפות הספקים אפשר לכוונן בהגדרות התוסף."
    billing: "עליכם לרכוש קרדיטים מראש. בדף Credits, לחצו על \"Add Credits\", הזינו סכום ואשרו באמצעות \"Purchase\"."
    limit: "בעת יצירת מפתח, הזינו סכום ב\"Credit limit\" ובחרו תקופה ב\"Reset limit every...\" כדי לקבוע תקרת שימוש לכל תקופה."

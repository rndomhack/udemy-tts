guide:
  title: "Cara menggunakan penyedia terjemahan"
  intro: "Terjemahan menggunakan AI generatif. Pilih salah satu penyedia di bawah, dapatkan kunci API dan tetapkannya dalam tetapan sambungan — hanya mengambil masa beberapa minit."
  privacy: "Kunci API anda hanya disimpan dalam pelayar anda dan hanya dihantar kepada penyedia yang anda pilih."
  disclaimer: "Anda menggunakan dan membayar penyedia atas risiko anda sendiri. Kami mengesyorkan menetapkan had perbelanjaan untuk berjaga-jaga."
  commonStep: "Tampal kunci yang disalin ke medan \"Kunci API\" dalam tetapan sambungan, pilih model dan klik \"Uji sambungan\"."
  openSettings: "Buka tetapan"
  optionsLink: "Cara menggunakan penyedia terjemahan"
  modelsHeading: "Model yang tersedia"
  modelsHint: "Sambungan ini menawarkan model berikut sebagai pratetap. Terjemahan memproses banyak sari kata pendek, jadi model yang murah dan pantas sudah memadai. Berikut ialah perbandingan setiap model dari segi kualiti, kelajuan dan kos."
  keyHeading: "Mendapatkan kunci API"
  billingHeading: "Harga dan pembayaran"
  limitHeading: "Mengawal perbelanjaan anda"
  models:
    gemini31FlashLite: "Kelajuan: Tinggi | Ketepatan: Sederhana | Kos: Rendah | Ketepatannya memadai untuk terjemahan. Disyorkan jika anda tidak pasti."
    gemini35FlashLite: "Kelajuan: Tinggi | Ketepatan: Tinggi | Kos: Sederhana | Pengganti siri 3.1 dengan ketepatan yang jauh lebih tinggi, tetapi kos sedikit lebih tinggi."
    gemma431bIt: "Kelajuan: Rendah | Ketepatan: Rendah | Kos: Percuma | Boleh digunakan pada peringkat percuma. Pilihan apabila anda terutamanya mahu mengurangkan kos."
    gpt54Mini: "Kelajuan: Sederhana | Ketepatan: Tinggi | Kos: Tinggi | Kosnya tinggi, jadi sesuai apabila anda mengutamakan kualiti."
    gpt54Nano: "Kelajuan: Sederhana | Ketepatan: Sederhana | Kos: Rendah | Lebih murah daripada mini, tetapi praktikal untuk terjemahan."
    deepseekV4Flash: "Kelajuan: Sederhana | Ketepatan: Tinggi | Kos: Rendah | Agak murah, namun ketepatannya tinggi. Pilihan utama apabila kos penting."
    qwen36Flash: "Kelajuan: Tinggi | Ketepatan: Sederhana | Kos: Rendah | Murah, dan ketepatannya juga agak baik."
  gemini:
    tagline: "Gemini tersedia, serta Gemma yang percuma. Disyorkan jika anda tidak pasti yang mana hendak dipilih."
    step1: "Buka Google AI Studio dan log masuk dengan akaun Google anda."
    step2: "Klik \"Cipta kunci API\", namakan kunci itu, pilih projek (atau gunakan \"Cipta projek\"), kemudian klik \"Cipta kunci\"."
    step3: "Salin kunci API yang dipaparkan."
    note: "Peringkat percuma mempunyai had kadar, tetapi biasanya mencukupi untuk menonton kuliah."
    billing: "Maklumat pembayaran tidak diperlukan pada peringkat percuma. Mendayakan pengebilan melonggarkan had kadar walaupun untuk model percuma, tetapi ambil perhatian: pengebilan adalah prabayar, dan kunci API berhenti berfungsi sehingga anda membeli kredit. Untuk mendayakan pengebilan, gunakan \"Sediakan pengebilan\" pada halaman Pengebilan untuk mendaftarkan maklumat pembayaran, kemudian beli kredit dengan \"Beli kredit\" (jumlah minimum dipaparkan pada skrin)."
    limit: "Pada halaman Perbelanjaan, \"Had perbelanjaan bulanan\" menetapkan had penggunaan bulanan. Gunakan \"Edit had perbelanjaan\" untuk menetapkan jumlahnya."
  openai:
    tagline: "Model ChatGPT tersedia. Anda perlu membeli kredit terlebih dahulu."
    step1: "Log masuk ke OpenAI Platform dan buka halaman \"API keys\"."
    step2: "Klik \"Create new secret key\" dan berikan sebarang nama."
    step3: "Salin kunci tersebut. Ia dipaparkan sekali sahaja, jadi salin dengan segera."
    note: "Ini berasingan daripada pelan ChatGPT berbayar."
    billing: "Anda perlu membeli kredit terlebih dahulu. Pada halaman \"Billing\", daftarkan kaedah pembayaran melalui \"Add payment details\", kemudian beli kredit melalui \"Add to credit balance\"."
    limit: "Pada halaman \"Limits\", gunakan \"Edit spend limit\" untuk menetapkan had penggunaan bulanan."
  openrouter:
    tagline: "Banyak model tersedia. Anda perlu membeli kredit terlebih dahulu."
    step1: "Log masuk ke OpenRouter dan buka halaman \"API keys\"."
    step2: "Klik \"New Key\", berikan sebarang nama, dan klik \"Create\". Had perbelanjaan yang diterangkan di bawah juga dimasukkan di sini."
    step3: "Salin kunci tersebut. Ia dipaparkan sekali sahaja, jadi salin dengan segera."
    note: "Keutamaan penyedia boleh dilaraskan dalam tetapan sambungan."
    billing: "Anda perlu membeli kredit terlebih dahulu. Pada halaman \"Credits\", klik \"Add Credits\", masukkan jumlah dan sahkan dengan \"Purchase\"."
    limit: "Semasa mencipta kunci, masukkan jumlah dalam \"Credit limit\" dan pilih tempoh dalam \"Reset limit every...\" untuk menetapkan had penggunaan setiap tempoh."

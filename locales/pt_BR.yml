guide:
  title: "Como usar os provedores de tradução"
  intro: "A tradução usa IA generativa. Escolha um dos provedores abaixo, obtenha uma chave de API e configure-a nas configurações da extensão — leva só alguns minutos."
  privacy: "Sua chave de API fica armazenada apenas no seu navegador e é enviada somente ao provedor selecionado."
  disclaimer: "Você usa e paga pelo provedor por sua conta e risco. Recomendamos definir um limite de gastos por precaução."
  commonStep: "Cole a chave copiada no campo \"Chave de API\" das configurações da extensão, escolha um modelo e clique em \"Testar conexão\"."
  openSettings: "Abrir configurações"
  optionsLink: "Como usar os provedores de tradução"
  modelsHeading: "Modelos disponíveis"
  modelsHint: "A extensão oferece os seguintes modelos como predefinições. A tradução processa muitas legendas curtas, então um modelo barato e rápido é mais que suficiente. Veja como cada modelo se compara em qualidade, velocidade e custo."
  keyHeading: "Obtendo uma chave de API"
  billingHeading: "Preços e pagamento"
  limitHeading: "Controlando seus gastos"
  models:
    gemini31FlashLite: "Velocidade: Alta | Precisão: Média | Custo: Baixo | A precisão é mais que suficiente para tradução. Recomendado se você está em dúvida."
    gemini35FlashLite: "Velocidade: Alta | Precisão: Alta | Custo: Média | O sucessor da série 3.1, com precisão bem mais alta, mas um custo um pouco maior."
    gemma431bIt: "Velocidade: Baixo | Precisão: Baixo | Custo: Grátis | Utilizável no nível gratuito. A escolha quando você quer principalmente manter os custos baixos."
    gpt54Mini: "Velocidade: Média | Precisão: Alta | Custo: Alta | O custo é alto, por isso é bom quando você prioriza a qualidade."
    gpt54Nano: "Velocidade: Média | Precisão: Média | Custo: Baixo | Mais barato que o mini, mas prático para tradução."
    deepseekV4Flash: "Velocidade: Média | Precisão: Alta | Custo: Baixo | Bem barato, mas com alta precisão. A melhor escolha quando o custo importa."
    qwen36Flash: "Velocidade: Alta | Precisão: Média | Custo: Baixo | Barato, e a precisão também é razoável."
  gemini:
    tagline: "O Gemini está disponível, além da Gemma gratuita. Recomendado se você está em dúvida sobre qual escolher."
    step1: "Abra o Google AI Studio e faça login com sua conta Google."
    step2: "Clique em \"Criar chave de API\", dê um nome à chave, escolha um projeto (ou use \"Criar projeto\") e clique em \"Criar chave\"."
    step3: "Copie a chave de API exibida."
    note: "O nível gratuito tem limites de taxa, mas geralmente é suficiente para assistir às aulas."
    billing: "No nível gratuito não são necessários dados de pagamento. Ativar o faturamento afrouxa os limites de taxa até para os modelos gratuitos, mas atenção: o faturamento é pré-pago e sua chave de API para de funcionar até você comprar créditos. Para ativar o faturamento, use \"Configurar faturamento\" na página \"Faturamento\" para cadastrar seus dados de pagamento e depois compre créditos em \"Comprar créditos\" (o valor mínimo é mostrado na tela)."
    limit: "Na página \"Gastos\", \"Limite de gastos mensal\" define um limite de uso mensal. Use \"Editar limite de gastos\" para definir o valor."
  openai:
    tagline: "Os modelos do ChatGPT estão disponíveis. É preciso comprar crédito com antecedência."
    step1: "Faça login na OpenAI Platform e abra a página API keys."
    step2: "Clique em \"Create new secret key\" e dê um nome qualquer."
    step3: "Copie a chave. Ela é exibida apenas uma vez, então copie na hora."
    note: "Isso é separado de um plano pago do ChatGPT."
    billing: "É preciso comprar crédito com antecedência. Na página Billing, cadastre um método de pagamento via \"Add payment details\" e depois compre crédito via \"Add to credit balance\"."
    limit: "Na página Limits, use \"Edit spend limit\" para definir um limite de uso mensal."
  openrouter:
    tagline: "Muitos modelos estão disponíveis. É preciso comprar créditos com antecedência."
    step1: "Faça login no OpenRouter e abra a página API keys."
    step2: "Clique em \"New Key\", dê um nome qualquer e clique em \"Create\". O limite de gastos descrito abaixo também é inserido aqui."
    step3: "Copie a chave. Ela é exibida apenas uma vez, então copie na hora."
    note: "A prioridade dos provedores pode ser ajustada nas configurações da extensão."
    billing: "É preciso comprar créditos com antecedência. Na página Credits, clique em \"Add Credits\", insira um valor e confirme com \"Purchase\"."
    limit: "Ao criar uma chave, insira um valor em \"Credit limit\" e escolha um período em \"Reset limit every...\" para definir um limite de uso por período."

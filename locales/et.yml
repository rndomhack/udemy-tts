guide:
  title: "Kuidas kasutada tõlketeenuse pakkujaid"
  intro: "Tõlkimine kasutab generatiivset tehisintellekti. Valige üks allolevatest teenusepakkujatest, hankige API-võti ja sisestage see laienduse seadetesse — see võtab vaid mõne minuti."
  privacy: "API-võtit hoitakse ainult teie brauseris ja see saadetakse ainult valitud teenusepakkujale."
  disclaimer: "Teenusepakkuja kasutamine ja selle eest tasumine on teie enda vastutusel. Soovitame igaks juhuks määrata kulupiirangu."
  commonStep: "Kleepige kopeeritud võti laienduse seadete väljale \"API-võti\", valige mudel ja klõpsake \"Testi ühendust\"."
  openSettings: "Ava seaded"
  optionsLink: "Kuidas kasutada tõlketeenuse pakkujaid"
  modelsHeading: "Saadaolevad mudelid"
  modelsHint: "Laiendus pakub eelseadetena järgmisi mudeleid. Tõlkimisel töödeldakse palju lühikesi subtiitreid, seega piisab odavast ja kiirest mudelist. Vaadake, kuidas mudelid võrreldes kvaliteedi, kiiruse ja hinna poolest paistavad."
  keyHeading: "API-võtme hankimine"
  billingHeading: "Hinnad ja tasumine"
  limitHeading: "Kulude kontrollimine"
  models:
    gemini31FlashLite: "Kiirus: Kõrge | Täpsus: Keskmine | Hind: Madal | Täpsus on tõlkimiseks enam kui piisav. Soovitatav, kui te pole kindel."
    gemini35FlashLite: "Kiirus: Kõrge | Täpsus: Kõrge | Hind: Keskmine | 3.1 seeria järeltulija märgatavalt kõrgema täpsusega, kuid pisut kõrgema hinnaga."
    gemma431bIt: "Kiirus: Madal | Täpsus: Madal | Hind: Tasuta | Kasutatav tasuta tasemel. Valik, kui soovite peamiselt kulusid madalal hoida."
    gpt54Mini: "Kiirus: Keskmine | Täpsus: Kõrge | Hind: Kõrge | Hind on kõrge, seega sobib, kui seate esikohale kvaliteedi."
    gpt54Nano: "Kiirus: Keskmine | Täpsus: Keskmine | Hind: Madal | Odavam kui mini, kuid tõlkimiseks praktiline."
    deepseekV4Flash: "Kiirus: Keskmine | Täpsus: Kõrge | Hind: Madal | Üsna odav, ent täpsus on kõrge. Parim valik, kui hind on oluline."
    qwen36Flash: "Kiirus: Kõrge | Täpsus: Keskmine | Hind: Madal | Soodne, ja täpsus on samuti korralik."
  gemini:
    tagline: "Saadaval on Gemini ja lisaks tasuta Gemma. Soovitatav, kui te pole kindel, millist valida."
    step1: "Avage Google AI Studio ja logige sisse oma Google’i kontoga."
    step2: "Klõpsake \"Loo API-võti\", andke võtmele nimi, valige projekt (või kasutage \"Loo projekt\") ja seejärel klõpsake \"Loo võti\"."
    step3: "Kopeerige kuvatud API-võti."
    note: "Tasuta tasemel on kasutuspiirangud, kuid loengute vaatamiseks sellest tavaliselt piisab."
    billing: "Tasuta tasemel pole makseandmeid vaja. Arvelduse lubamine leevendab kasutuspiiranguid isegi tasuta mudelite puhul, kuid pange tähele: arveldus on ettemakstud ja API võti lakkab töötamast, kuni ostate krediiti. Arvelduse lubamiseks kasutage lehel Arveldus valikut \"Seadista arveldus\" makseandmete registreerimiseks ja ostke seejärel krediiti valikuga \"Osta krediiti\" (miinimumsumma kuvatakse ekraanil)."
    limit: "Lehel Kulud määrab \"Igakuine kulupiirang\" igakuise kasutuspiirangu. Summa määramiseks kasutage \"Muuda kulupiirangut\"."
  openai:
    tagline: "Saadaval on ChatGPT mudelid. Krediit tuleb osta ette."
    step1: "Logige sisse OpenAI Platformi ja avage leht API keys."
    step2: "Klõpsake \"Create new secret key\" ja andke suvaline nimi."
    step3: "Kopeerige võti. Seda näidatakse ainult üks kord, seega kopeerige kohe."
    note: "See on eraldi tasulisest ChatGPT tellimusest."
    billing: "Krediit tuleb osta ette. Registreerige lehel Billing makseviis valiku \"Add payment details\" kaudu ja ostke seejärel krediiti valiku \"Add to credit balance\" kaudu."
    limit: "Lehel Limits kasutage igakuise kasutuspiirangu määramiseks valikut \"Edit spend limit\"."
  openrouter:
    tagline: "Saadaval on palju mudeleid. Krediit tuleb osta ette."
    step1: "Logige sisse OpenRouterisse ja avage leht API keys."
    step2: "Klõpsake \"New Key\", andke suvaline nimi ja klõpsake \"Create\". Allpool kirjeldatud kulupiirang sisestatakse samuti siin."
    step3: "Kopeerige võti. Seda näidatakse ainult üks kord, seega kopeerige kohe."
    note: "Teenusepakkujate prioriteeti saab muuta laienduse seadetes."
    billing: "Krediit tuleb osta ette. Lehel Credits klõpsake \"Add Credits\", sisestage summa ja kinnitage valikuga \"Purchase\"."
    limit: "Võtme loomisel sisestage summa väljale \"Credit limit\" ja valige periood valikus \"Reset limit every...\", et määrata kasutuspiirang perioodi kohta."

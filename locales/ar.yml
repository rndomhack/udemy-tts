guide:
  title: "كيفية استخدام مزودي الترجمة"
  intro: "تستخدم الترجمة الذكاء الاصطناعي التوليدي. اختر أحد المزودين أدناه، واحصل على مفتاح API، واضبطه في إعدادات الإضافة — لا يستغرق الأمر سوى بضع دقائق."
  privacy: "يُحفظ مفتاح API في متصفحك فقط، ولا يُرسل إلا إلى المزود الذي اخترته."
  disclaimer: "أنت تستخدم المزود وتدفع مقابله على مسؤوليتك الخاصة. نوصي بتعيين حد للإنفاق تحسبًا لأي طارئ."
  commonStep: "الصق المفتاح المنسوخ في حقل \"مفتاح API\" في إعدادات الإضافة، ثم اختر نموذجًا وانقر على \"اختبار الاتصال\"."
  openSettings: "فتح الإعدادات"
  optionsLink: "كيفية استخدام مزودي الترجمة"
  modelsHeading: "النماذج المتاحة"
  modelsHint: "توفر الإضافة النماذج التالية كإعدادات مسبقة. تعالج الترجمة عددًا كبيرًا من الترجمات النصية القصيرة، لذا يكفي نموذج رخيص وسريع. وفيما يلي مقارنة كل نموذج من حيث الجودة والسرعة والتكلفة."
  keyHeading: "الحصول على مفتاح API"
  billingHeading: "الأسعار والدفع"
  limitHeading: "التحكم في إنفاقك"
  models:
    gemini31FlashLite: "السرعة: عالية | الدقة: متوسطة | التكلفة: منخفضة | الدقة كافية للترجمة. يُنصح به إذا لم تكن متأكدًا."
    gemini35FlashLite: "السرعة: عالية | الدقة: عالية | التكلفة: متوسطة | النسخة اللاحقة لسلسلة 3.1 بدقة أعلى بشكل ملحوظ، لكن بتكلفة أعلى قليلاً."
    gemma431bIt: "السرعة: منخفضة | الدقة: منخفضة | التكلفة: مجانية | يمكن استخدامه ضمن الباقة المجانية. الخيار الأنسب عندما ترغب أساسًا في خفض التكاليف."
    gpt54Mini: "السرعة: متوسطة | الدقة: عالية | التكلفة: عالية | التكلفة مرتفعة، لذا يناسب عندما تعطي الأولوية للجودة."
    gpt54Nano: "السرعة: متوسطة | الدقة: متوسطة | التكلفة: منخفضة | أرخص من mini، لكنه عملي للترجمة."
    deepseekV4Flash: "السرعة: متوسطة | الدقة: عالية | التكلفة: منخفضة | رخيص جدًا مع دقة عالية. الخيار الأول عندما تهم التكلفة."
    qwen36Flash: "السرعة: عالية | الدقة: متوسطة | التكلفة: منخفضة | غير مكلف، والدقة معقولة أيضًا."
  gemini:
    tagline: "يتوفر Gemini، إضافةً إلى Gemma المجاني. يُنصح به إذا لم تكن متأكدًا مما تختار."
    step1: "افتح Google AI Studio وسجّل الدخول بحساب Google الخاص بك."
    step2: "انقر على \"إنشاء مفتاح API\"، وسمِّ المفتاح، واختر مشروعًا (أو استخدم \"إنشاء مشروع\")، ثم انقر على \"إنشاء مفتاح\"."
    step3: "انسخ مفتاح API المعروض."
    note: "للباقة المجانية حدود لمعدل الاستخدام، لكنها تكفي عادةً لمشاهدة المحاضرات."
    billing: "لا تحتاج إلى معلومات دفع في الباقة المجانية. تفعيل الفوترة يخفف حدود معدل الاستخدام حتى للنماذج المجانية، لكن انتبه إلى أن الفوترة مسبقة الدفع: يتوقف مفتاح API عن العمل حتى تشتري رصيدًا. لتفعيل الفوترة، استخدم \"إعداد الفوترة\" في صفحة الفوترة لتسجيل معلومات الدفع، ثم اشترِ رصيدًا عبر \"شراء رصيد\" (يظهر الحد الأدنى للمبلغ على الشاشة)."
    limit: "في صفحة الإنفاق، يحدد \"الحد الأقصى للإنفاق الشهري\" حدًا شهريًا للاستخدام. استخدم \"تعديل حد الإنفاق\" لتعيين المبلغ."
  openai:
    tagline: "نماذج ChatGPT متاحة. تحتاج إلى شراء رصيد مسبقًا."
    step1: "سجّل الدخول إلى OpenAI Platform وافتح صفحة API keys."
    step2: "انقر على \"Create new secret key\" وأعطه أي اسم."
    step3: "انسخ المفتاح. يظهر مرة واحدة فقط، لذا انسخه فورًا."
    note: "هذا منفصل عن خطة ChatGPT المدفوعة."
    billing: "تحتاج إلى شراء رصيد مسبقًا. في صفحة Billing، سجّل طريقة دفع عبر \"Add payment details\"، ثم اشترِ رصيدًا عبر \"Add to credit balance\"."
    limit: "في صفحة Limits، استخدم \"Edit spend limit\" لتعيين حد شهري للاستخدام."
  openrouter:
    tagline: "تتوفر نماذج عديدة. تحتاج إلى شراء رصيد مسبقًا."
    step1: "سجّل الدخول إلى OpenRouter وافتح صفحة API keys."
    step2: "انقر على \"New Key\"، وأعطه أي اسم، ثم انقر على \"Create\". كما يُدخَل حد الإنفاق الموضّح أدناه هنا."
    step3: "انسخ المفتاح. يظهر مرة واحدة فقط، لذا انسخه فورًا."
    note: "يمكن ضبط أولوية المزودين في إعدادات الإضافة."
    billing: "تحتاج إلى شراء رصيد مسبقًا. في صفحة Credits، انقر على \"Add Credits\"، وأدخل مبلغًا، وأكِّد عبر \"Purchase\"."
    limit: "عند إنشاء مفتاح، أدخل مبلغًا في \"Credit limit\" واختر فترة في \"Reset limit every...\" لتعيين حد استخدام لكل فترة."

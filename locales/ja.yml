guide:
  title: "翻訳プロバイダの利用方法"
  intro: "翻訳には生成AIを使用します。以下のプロバイダから1つ選んでAPIキーを取得し、拡張機能の設定に登録してください。数分で完了します。"
  privacy: "APIキーはブラウザ内にのみ保存され、選択したプロバイダ以外には送信されません。"
  disclaimer: "プロバイダの利用および課金は自己責任です。万が一に備えて、利用額の制限の設定をおすすめします。"
  commonStep: "コピーしたキーを拡張機能設定の「API キー」欄に貼り付け、モデルを選んで「接続テスト」をクリックします。"
  openSettings: "設定を開く"
  optionsLink: "翻訳プロバイダの利用方法"
  modelsHeading: "使用可能なモデル"
  modelsHint: "拡張機能では以下のモデルをプリセットから選択できます。翻訳は短い字幕を大量に処理するため、安く高速なモデルで十分です。各モデルの精度・速度・料金の傾向は次のとおりです。"
  keyHeading: "APIキーの取得"
  billingHeading: "料金と支払い"
  limitHeading: "利用額の制限"
  models:
    gemini31FlashLite: "速度: 高 | 精度: 中 | 料金: 低 | 精度は翻訳には十分。迷ったらこれがおすすめです。"
    gemini35FlashLite: "速度: 高 | 精度: 高 | 料金: 中 | 3.1 系の後継で、精度が大きく向上しています。ただし料金はやや高めです。"
    gemma431bIt: "速度: 低 | 精度: 低 | 料金: 無 | 無料枠で使えます。とにかく費用を抑えたい場合の選択肢です。"
    gpt54Mini: "速度: 中 | 精度: 高 | 料金: 高 | 料金は高めなので、品質を重視する場合に向きます。"
    gpt54Nano: "速度: 中 | 精度: 中 | 料金: 低 | miniより安いですが、翻訳には実用的です。"
    deepseekV4Flash: "速度: 中 | 精度: 高 | 料金: 低 | かなり安めですが、精度は高いです。コスト重視なら一番のおすすめです。"
    qwen36Flash: "速度: 高 | 精度: 中 | 料金: 低 | 安価で、精度もそれなりです。"
  gemini:
    tagline: "Geminiが使用でき、無料のGemmaもあります。迷ったらこれがおすすめです。"
    step1: "Google AI Studio を開き、Google アカウントでサインインします。"
    step2: "「API キーを作成」をクリックし、キー名を設定してプロジェクトを選択し (無い場合は「プロジェクトを作成」)、「キーを作成」をクリックします。"
    step3: "表示された API キーをコピーします。"
    note: "無料枠にはレート制限がありますが、講義の視聴には通常十分です。"
    billing: "無料枠なら支払い情報の登録は不要です。課金を有効にすると無料のモデルでもレート制限が緩和されますが、先払い制のため、クレジットを購入するまで API キーが使えなくなる点に注意してください。課金する場合は「課金」ページの「お支払情報を設定」から支払い情報を登録し、続けて「クレジットを購入」で必要額 (最低額は画面に表示されます) を購入します。"
    limit: "「利用額」ページの「1 か月の費用の上限」で月間の利用上限を設定できます。「費用の上限を編集」で金額を指定します。"
  openai:
    tagline: "ChatGPTが使用できます。事前にクレジットの購入が必要です。"
    step1: "OpenAI Platform にサインインし、API keys ページを開きます。"
    step2: "「Create new secret key」をクリックし、任意の名前を付けます。"
    step3: "キーをコピーします。表示は一度きりなので、その場でコピーしてください。"
    note: "ChatGPT の有料プランとは別契約です。"
    billing: "事前にクレジットの購入が必要です。Billing ページで「Add payment details」から支払い方法を登録し、「Add to credit balance」でクレジットを購入します。"
    limit: "Limits ページの「Edit spend limit」で月間利用上限を設定できます。"
  openrouter:
    tagline: "多数のモデルを利用可能。事前にクレジットの購入が必要です。"
    step1: "OpenRouter にサインインし、API keys ページを開きます。"
    step2: "「New Key」をクリックし、任意の名前を付けて「Create」をクリックします。下記の利用額の制限もここで入力します。"
    step3: "キーをコピーします。表示は一度きりなので、その場でコピーしてください。"
    note: "プロバイダの優先順位は拡張機能の設定で調整できます。"
    billing: "事前にクレジットの購入が必要です。Credits ページの「Add Credits」から金額を指定して「Purchase」で購入します。"
    limit: "キー作成時の「Credit limit」欄に金額を入力し、「Reset limit every...」で周期を選ぶと、期間ごとの利用上限を設定できます。"

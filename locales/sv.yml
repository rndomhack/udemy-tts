guide:
  title: "Så använder du översättningsleverantörer"
  intro: "Översättningen använder generativ AI. Välj en av leverantörerna nedan, skaffa en API-nyckel och ange den i tilläggets inställningar — det tar bara några minuter."
  privacy: "Din API-nyckel lagras endast i din webbläsare och skickas bara till den leverantör du valt."
  disclaimer: "Du använder och betalar för leverantören på egen risk. Vi rekommenderar att du sätter en utgiftsgräns för säkerhets skull."
  commonStep: "Klistra in den kopierade nyckeln i fältet \"API-nyckel\" i tilläggets inställningar, välj en modell och klicka på \"Testa anslutning\"."
  openSettings: "Öppna inställningar"
  optionsLink: "Så använder du översättningsleverantörer"
  modelsHeading: "Tillgängliga modeller"
  modelsHint: "Tillägget erbjuder följande modeller som förinställningar. Översättning bearbetar många korta undertexter, så en billig och snabb modell räcker gott. Så här står sig modellerna vad gäller kvalitet, hastighet och kostnad."
  keyHeading: "Skaffa en API-nyckel"
  billingHeading: "Priser och betalning"
  limitHeading: "Kontrollera dina utgifter"
  models:
    gemini31FlashLite: "Hastighet: Hög | Noggrannhet: Medel | Kostnad: Låg | Noggrannheten är gott och väl nog för översättning. Rekommenderas om du är osäker."
    gemini35FlashLite: "Hastighet: Hög | Noggrannhet: Hög | Kostnad: Medel | Efterföljaren till 3.1-serien med betydligt högre noggrannhet, men något högre kostnad."
    gemma431bIt: "Hastighet: Låg | Noggrannhet: Låg | Kostnad: Gratis | Användbar på gratisnivån. Valet när du främst vill hålla nere kostnaderna."
    gpt54Mini: "Hastighet: Medel | Noggrannhet: Hög | Kostnad: Hög | Kostnaden är hög, så den passar när du prioriterar kvalitet."
    gpt54Nano: "Hastighet: Medel | Noggrannhet: Medel | Kostnad: Låg | Billigare än mini, men praktisk för översättning."
    deepseekV4Flash: "Hastighet: Medel | Noggrannhet: Hög | Kostnad: Låg | Ganska billig, men ändå med hög noggrannhet. Det bästa valet när kostnaden spelar roll."
    qwen36Flash: "Hastighet: Hög | Noggrannhet: Medel | Kostnad: Låg | Billig, och noggrannheten är också hyfsad."
  gemini:
    tagline: "Gemini är tillgänglig, plus gratis Gemma. Rekommenderas om du är osäker på vad du ska välja."
    step1: "Öppna Google AI Studio och logga in med ditt Google-konto."
    step2: "Klicka på \"Skapa API-nyckel\", namnge nyckeln, välj ett projekt (eller använd \"Skapa projekt\") och klicka sedan på \"Skapa nyckel\"."
    step3: "Kopiera API-nyckeln som visas."
    note: "Gratisnivån har hastighetsgränser, men det räcker oftast för att titta på föreläsningar."
    billing: "På gratisnivån behövs ingen betalningsinformation. Om du aktiverar fakturering mildras hastighetsgränserna även för gratismodeller, men observera: faktureringen är förbetald och din API-nyckel slutar fungera tills du köper krediter. För att aktivera fakturering, använd \"Konfigurera fakturering\" på sidan Fakturering för att registrera din betalningsinformation och köp sedan krediter med \"Köp krediter\" (minimibeloppet visas på skärmen)."
    limit: "På sidan Utgifter anger \"Månatlig utgiftsgräns\" en månatlig användningsgräns. Använd \"Redigera utgiftsgräns\" för att ställa in beloppet."
  openai:
    tagline: "ChatGPT-modeller är tillgängliga. Du måste köpa kredit i förväg."
    step1: "Logga in på OpenAI Platform och öppna sidan API keys."
    step2: "Klicka på \"Create new secret key\" och ge den valfritt namn."
    step3: "Kopiera nyckeln. Den visas bara en gång, så kopiera den direkt."
    note: "Detta är skilt från ett betalt ChatGPT-abonnemang."
    billing: "Du måste köpa kredit i förväg. På sidan Billing registrerar du en betalningsmetod via \"Add payment details\" och köper sedan kredit via \"Add to credit balance\"."
    limit: "På sidan Limits använder du \"Edit spend limit\" för att ställa in en månatlig användningsgräns."
  openrouter:
    tagline: "Många modeller är tillgängliga. Du måste köpa krediter i förväg."
    step1: "Logga in på OpenRouter och öppna sidan API keys."
    step2: "Klicka på \"New Key\", ge den valfritt namn och klicka på \"Create\". Utgiftsgränsen som beskrivs nedan anges också här."
    step3: "Kopiera nyckeln. Den visas bara en gång, så kopiera den direkt."
    note: "Leverantörsprioriteten kan finjusteras i tilläggets inställningar."
    billing: "Du måste köpa krediter i förväg. På sidan Credits klickar du på \"Add Credits\", anger ett belopp och bekräftar med \"Purchase\"."
    limit: "När du skapar en nyckel anger du ett belopp i \"Credit limit\" och väljer en period i \"Reset limit every...\" för att sätta en användningsgräns per period."

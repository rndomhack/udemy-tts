guide:
  title: "วิธีใช้ผู้ให้บริการแปล"
  intro: "การแปลใช้ AI เชิงสร้างสรรค์ เลือกผู้ให้บริการรายใดรายหนึ่งด้านล่าง รับคีย์ API แล้วตั้งค่าในการตั้งค่าส่วนขยาย — ใช้เวลาเพียงไม่กี่นาที"
  privacy: "คีย์ API ของคุณจะถูกเก็บไว้ในเบราว์เซอร์ของคุณเท่านั้น และส่งไปยังผู้ให้บริการที่คุณเลือกเท่านั้น"
  disclaimer: "คุณใช้และชำระเงินให้ผู้ให้บริการด้วยความเสี่ยงของคุณเอง เราแนะนำให้ตั้งวงเงินใช้จ่ายไว้เผื่อกรณีฉุกเฉิน"
  commonStep: "วางคีย์ที่คัดลอกลงในช่อง \"คีย์ API\" ในการตั้งค่าส่วนขยาย เลือกโมเดล แล้วคลิก \"ทดสอบการเชื่อมต่อ\""
  openSettings: "เปิดการตั้งค่า"
  optionsLink: "วิธีใช้ผู้ให้บริการแปล"
  modelsHeading: "โมเดลที่ใช้ได้"
  modelsHint: "ส่วนขยายมีโมเดลต่อไปนี้เป็นค่าตั้งล่วงหน้า การแปลประมวลผลคำบรรยายสั้น ๆ จำนวนมาก ดังนั้นโมเดลที่ราคาถูกและรวดเร็วก็เพียงพอแล้ว ต่อไปนี้คือการเปรียบเทียบแต่ละโมเดลในด้านคุณภาพ ความเร็ว และค่าใช้จ่าย"
  keyHeading: "การรับคีย์ API"
  billingHeading: "ราคาและการชำระเงิน"
  limitHeading: "การควบคุมยอดใช้จ่าย"
  models:
    gemini31FlashLite: "ความเร็ว: สูง | ความแม่นยำ: ปานกลาง | ค่าใช้จ่าย: ต่ำ | ความแม่นยำเพียงพอสำหรับการแปล แนะนำหากคุณไม่แน่ใจ"
    gemini35FlashLite: "ความเร็ว: สูง | ความแม่นยำ: สูง | ค่าใช้จ่าย: ปานกลาง | รุ่นต่อจากซีรีส์ 3.1 ที่มีความแม่นยำสูงขึ้นอย่างเห็นได้ชัด แต่ราคาสูงขึ้นเล็กน้อย"
    gemma431bIt: "ความเร็ว: ต่ำ | ความแม่นยำ: ต่ำ | ค่าใช้จ่าย: ฟรี | ใช้ได้ในระดับใช้ฟรี เป็นตัวเลือกเมื่อคุณต้องการประหยัดค่าใช้จ่ายเป็นหลัก"
    gpt54Mini: "ความเร็ว: ปานกลาง | ความแม่นยำ: สูง | ค่าใช้จ่าย: สูง | ค่าใช้จ่ายสูง จึงเหมาะเมื่อคุณให้ความสำคัญกับคุณภาพ"
    gpt54Nano: "ความเร็ว: ปานกลาง | ความแม่นยำ: ปานกลาง | ค่าใช้จ่าย: ต่ำ | ถูกกว่า mini แต่ใช้งานได้จริงสำหรับการแปล"
    deepseekV4Flash: "ความเร็ว: ปานกลาง | ความแม่นยำ: สูง | ค่าใช้จ่าย: ต่ำ | ราคาถูกพอสมควรแต่ความแม่นยำสูง เป็นตัวเลือกอันดับหนึ่งเมื่อค่าใช้จ่ายสำคัญ"
    qwen36Flash: "ความเร็ว: สูง | ความแม่นยำ: ปานกลาง | ค่าใช้จ่าย: ต่ำ | ราคาถูก และความแม่นยำก็ใช้ได้"
  gemini:
    tagline: "มี Gemini ให้ใช้ พร้อม Gemma ที่ใช้ฟรี แนะนำหากคุณไม่แน่ใจว่าจะเลือกอะไร"
    step1: "เปิด Google AI Studio แล้วลงชื่อเข้าใช้ด้วยบัญชี Google ของคุณ"
    step2: "คลิก \"สร้างคีย์ API\" ตั้งชื่อคีย์ เลือกโปรเจกต์ (หรือใช้ \"สร้างโปรเจกต์\") แล้วคลิก \"สร้างคีย์\""
    step3: "คัดลอกคีย์ API ที่แสดงขึ้น"
    note: "ระดับใช้ฟรีมีการจำกัดอัตรา แต่โดยปกติเพียงพอสำหรับการดูบทเรียน"
    billing: "ในระดับใช้ฟรีไม่จำเป็นต้องมีข้อมูลการชำระเงิน การเปิดใช้การเรียกเก็บเงินจะผ่อนคลายการจำกัดอัตราแม้กับโมเดลฟรี แต่โปรดทราบว่าเป็นระบบชำระเงินล่วงหน้า คีย์ API จะใช้งานไม่ได้จนกว่าคุณจะซื้อเครดิต หากต้องการเปิดใช้การเรียกเก็บเงิน ให้ใช้ \"ตั้งค่าการเรียกเก็บเงิน\" ในหน้า การเรียกเก็บเงิน เพื่อลงทะเบียนข้อมูลการชำระเงิน แล้วซื้อเครดิตด้วย \"ซื้อเครดิต\" (จำนวนขั้นต่ำแสดงบนหน้าจอ)"
    limit: "ในหน้า ยอดใช้จ่าย ใช้ \"วงเงินใช้จ่ายรายเดือน\" เพื่อกำหนดขีดจำกัดการใช้งานรายเดือน ใช้ \"แก้ไขวงเงินใช้จ่าย\" เพื่อกำหนดจำนวนเงิน"
  openai:
    tagline: "มีโมเดล ChatGPT ให้ใช้ ต้องซื้อเครดิตล่วงหน้า"
    step1: "ลงชื่อเข้าใช้ OpenAI Platform แล้วเปิดหน้า API keys"
    step2: "คลิก \"Create new secret key\" แล้วตั้งชื่ออะไรก็ได้"
    step3: "คัดลอกคีย์ คีย์จะแสดงเพียงครั้งเดียว ดังนั้นให้คัดลอกทันที"
    note: "นี่แยกต่างหากจากแพ็กเกจ ChatGPT แบบชำระเงิน"
    billing: "ต้องซื้อเครดิตล่วงหน้า ในหน้า Billing ให้ลงทะเบียนวิธีการชำระเงินผ่าน \"Add payment details\" แล้วซื้อเครดิตผ่าน \"Add to credit balance\""
    limit: "ในหน้า Limits ใช้ \"Edit spend limit\" เพื่อกำหนดขีดจำกัดการใช้งานรายเดือน"
  openrouter:
    tagline: "มีโมเดลจำนวนมากให้ใช้ ต้องซื้อเครดิตล่วงหน้า"
    step1: "ลงชื่อเข้าใช้ OpenRouter แล้วเปิดหน้า API keys"
    step2: "คลิก \"New Key\" ตั้งชื่ออะไรก็ได้ แล้วคลิก \"Create\" วงเงินใช้จ่ายที่อธิบายด้านล่างก็กรอกที่นี่เช่นกัน"
    step3: "คัดลอกคีย์ คีย์จะแสดงเพียงครั้งเดียว ดังนั้นให้คัดลอกทันที"
    note: "ลำดับความสำคัญของผู้ให้บริการปรับได้ในการตั้งค่าส่วนขยาย"
    billing: "ต้องซื้อเครดิตล่วงหน้า ในหน้า Credits คลิก \"Add Credits\" กรอกจำนวนเงิน แล้วยืนยันด้วย \"Purchase\""
    limit: "เมื่อสร้างคีย์ ให้กรอกจำนวนเงินใน \"Credit limit\" แล้วเลือกช่วงเวลาใน \"Reset limit every...\" เพื่อกำหนดขีดจำกัดการใช้งานต่อช่วงเวลา"

guide:
  title: "Cara menggunakan penyedia terjemahan"
  intro: "Terjemahan menggunakan AI generatif. Pilih salah satu penyedia di bawah, dapatkan kunci API, lalu atur di pengaturan ekstensi — hanya perlu beberapa menit."
  privacy: "Kunci API Anda hanya disimpan di browser Anda dan hanya dikirim ke penyedia yang Anda pilih."
  disclaimer: "Anda menggunakan dan membayar penyedia atas risiko Anda sendiri. Kami menyarankan untuk menetapkan batas pengeluaran untuk berjaga-jaga."
  commonStep: "Tempel kunci yang disalin ke kolom \"Kunci API\" di pengaturan ekstensi, pilih model, lalu klik \"Uji koneksi\"."
  openSettings: "Buka pengaturan"
  optionsLink: "Cara menggunakan penyedia terjemahan"
  modelsHeading: "Model yang tersedia"
  modelsHint: "Ekstensi menyediakan model-model berikut sebagai preset. Terjemahan memproses banyak subtitel pendek, jadi model yang murah dan cepat sudah lebih dari cukup. Berikut perbandingan setiap model dari sisi kualitas, kecepatan, dan biaya."
  keyHeading: "Mendapatkan kunci API"
  billingHeading: "Harga dan pembayaran"
  limitHeading: "Mengontrol pengeluaran Anda"
  models:
    gemini31FlashLite: "Kecepatan: Tinggi | Akurasi: Sedang | Biaya: Rendah | Akurasinya lebih dari cukup untuk terjemahan. Direkomendasikan jika Anda ragu."
    gemini35FlashLite: "Kecepatan: Tinggi | Akurasi: Tinggi | Biaya: Sedang | Penerus dari seri 3.1, dengan akurasi yang jauh lebih baik, tetapi harga sedikit lebih tinggi."
    gemma431bIt: "Kecepatan: Rendah | Akurasi: Rendah | Biaya: Gratis | Dapat dipakai di tingkat gratis. Pilihan saat Anda terutama ingin menekan biaya."
    gpt54Mini: "Kecepatan: Sedang | Akurasi: Tinggi | Biaya: Tinggi | Biayanya tinggi, jadi cocok saat Anda mengutamakan kualitas."
    gpt54Nano: "Kecepatan: Sedang | Akurasi: Sedang | Biaya: Rendah | Lebih murah dari mini, tetapi praktis untuk terjemahan."
    deepseekV4Flash: "Kecepatan: Sedang | Akurasi: Tinggi | Biaya: Rendah | Cukup murah, namun akurasinya tinggi. Pilihan utama saat biaya menjadi pertimbangan."
    qwen36Flash: "Kecepatan: Tinggi | Akurasi: Sedang | Biaya: Rendah | Murah, dan akurasinya juga cukup baik."
  gemini:
    tagline: "Gemini tersedia, ditambah Gemma yang gratis. Direkomendasikan jika Anda ragu memilih yang mana."
    step1: "Buka Google AI Studio dan masuk dengan akun Google Anda."
    step2: "Klik \"Buat kunci API\", beri nama kunci, pilih proyek (atau gunakan \"Buat proyek\"), lalu klik \"Buat kunci\"."
    step3: "Salin kunci API yang ditampilkan."
    note: "Tingkat gratis memiliki batas laju, tetapi biasanya cukup untuk menonton kuliah."
    billing: "Tidak diperlukan info pembayaran di tingkat gratis. Mengaktifkan penagihan melonggarkan batas laju bahkan untuk model gratis, tetapi perhatikan: penagihan bersifat prabayar, dan kunci API berhenti berfungsi sampai Anda membeli kredit. Untuk mengaktifkan penagihan, gunakan \"Siapkan penagihan\" di halaman Penagihan untuk mendaftarkan info pembayaran, lalu beli kredit dengan \"Beli kredit\" (jumlah minimum ditampilkan di layar)."
    limit: "Di halaman Pengeluaran, \"Batas pengeluaran bulanan\" menetapkan batas penggunaan bulanan. Gunakan \"Edit batas pengeluaran\" untuk menetapkan jumlahnya."
  openai:
    tagline: "Model ChatGPT tersedia. Anda perlu membeli kredit terlebih dahulu."
    step1: "Masuk ke OpenAI Platform dan buka halaman API keys."
    step2: "Klik \"Create new secret key\" dan beri nama apa saja."
    step3: "Salin kuncinya. Kunci hanya ditampilkan sekali, jadi segera salin."
    note: "Ini terpisah dari langganan berbayar ChatGPT."
    billing: "Anda perlu membeli kredit terlebih dahulu. Di halaman Billing, daftarkan metode pembayaran melalui \"Add payment details\", lalu beli kredit melalui \"Add to credit balance\"."
    limit: "Di halaman Limits, gunakan \"Edit spend limit\" untuk menetapkan batas penggunaan bulanan."
  openrouter:
    tagline: "Banyak model tersedia. Anda perlu membeli kredit terlebih dahulu."
    step1: "Masuk ke OpenRouter dan buka halaman API keys."
    step2: "Klik \"New Key\", beri nama apa saja, lalu klik \"Create\". Batas pengeluaran yang dijelaskan di bawah juga dimasukkan di sini."
    step3: "Salin kuncinya. Kunci hanya ditampilkan sekali, jadi segera salin."
    note: "Prioritas penyedia dapat diatur di pengaturan ekstensi."
    billing: "Anda perlu membeli kredit terlebih dahulu. Di halaman Credits, klik \"Add Credits\", masukkan jumlah, lalu konfirmasi dengan \"Purchase\"."
    limit: "Saat membuat kunci, masukkan jumlah di \"Credit limit\" dan pilih periode di \"Reset limit every...\" untuk menetapkan batas penggunaan per periode."

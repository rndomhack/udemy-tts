guide:
  title: "Jak korzystać z dostawców tłumaczeń"
  intro: "Tłumaczenie korzysta z generatywnej AI. Wybierz jednego z poniższych dostawców, uzyskaj klucz API i wprowadź go w ustawieniach rozszerzenia — zajmie to tylko kilka minut."
  privacy: "Klucz API jest przechowywany wyłącznie w Twojej przeglądarce i wysyłany tylko do wybranego dostawcy."
  disclaimer: "Z dostawcy korzystasz i płacisz na własne ryzyko. Na wszelki wypadek zalecamy ustawienie limitu wydatków."
  commonStep: "Wklej skopiowany klucz w polu „Klucz API” w ustawieniach rozszerzenia, wybierz model i kliknij „Testuj połączenie”."
  openSettings: "Otwórz ustawienia"
  optionsLink: "Jak korzystać z dostawców tłumaczeń"
  modelsHeading: "Dostępne modele"
  modelsHint: "Rozszerzenie oferuje następujące modele jako gotowe ustawienia. Tłumaczenie przetwarza wiele krótkich napisów, więc tani i szybki model w zupełności wystarcza. Oto jak poszczególne modele wypadają pod względem jakości, szybkości i kosztu."
  keyHeading: "Uzyskiwanie klucza API"
  billingHeading: "Ceny i płatności"
  limitHeading: "Kontrola wydatków"
  models:
    gemini31FlashLite: "Szybkość: Wysoka | Dokładność: Średnia | Koszt: Niski | Dokładność w zupełności wystarcza do tłumaczenia. Polecany, jeśli nie masz pewności."
    gemini35FlashLite: "Szybkość: Wysoka | Dokładność: Wysoka | Koszt: Średnia | Następca serii 3.1 o znacznie wyższej dokładności, ale nieco wyższym koszcie."
    gemma431bIt: "Szybkość: Niski | Dokładność: Niski | Koszt: Bezpłatny | Dostępny w wersji bezpłatnej. Wybór, gdy zależy Ci głównie na ograniczeniu kosztów."
    gpt54Mini: "Szybkość: Średnia | Dokładność: Wysoka | Koszt: Wysoka | Koszt jest wysoki, więc pasuje, gdy priorytetem jest jakość."
    gpt54Nano: "Szybkość: Średnia | Dokładność: Średnia | Koszt: Niski | Tańszy od mini, ale praktyczny do tłumaczenia."
    deepseekV4Flash: "Szybkość: Średnia | Dokładność: Wysoka | Koszt: Niski | Dość tani, a mimo to o wysokiej dokładności. Najlepszy wybór, gdy liczy się koszt."
    qwen36Flash: "Szybkość: Wysoka | Dokładność: Średnia | Koszt: Niski | Niedrogi, a dokładność też jest niezła."
  gemini:
    tagline: "Dostępne jest Gemini oraz darmowa Gemma. Polecane, jeśli nie wiesz, co wybrać."
    step1: "Otwórz Google AI Studio i zaloguj się kontem Google."
    step2: "Kliknij „Utwórz klucz API”, nadaj nazwę kluczowi, wybierz projekt (lub użyj „Utwórz projekt”), a następnie kliknij „Utwórz klucz”."
    step3: "Skopiuj wyświetlony klucz API."
    note: "Wersja bezpłatna ma limity szybkości, ale zwykle wystarcza do oglądania wykładów."
    billing: "W wersji bezpłatnej dane płatności nie są wymagane. Włączenie płatności łagodzi limity szybkości nawet dla darmowych modeli, ale uwaga: rozliczenia są przedpłacone i klucz API przestaje działać, dopóki nie kupisz środków. Aby włączyć płatności, użyj opcji „Skonfiguruj płatności” na stronie „Płatności”, aby zarejestrować dane płatności, a następnie kup środki za pomocą „Kup środki” (minimalna kwota jest widoczna na ekranie)."
    limit: "Na stronie „Wydatki” opcja „Miesięczny limit wydatków” ustawia miesięczny limit użycia. Użyj „Edytuj limit wydatków”, aby ustawić kwotę."
  openai:
    tagline: "Dostępne są modele ChatGPT. Musisz wcześniej doładować środki."
    step1: "Zaloguj się w OpenAI Platform i otwórz stronę API keys."
    step2: "Kliknij „Create new secret key” i nadaj dowolną nazwę."
    step3: "Skopiuj klucz. Jest wyświetlany tylko raz, więc skopiuj go od razu."
    note: "To coś odrębnego od płatnego planu ChatGPT."
    billing: "Musisz wcześniej doładować środki. Na stronie Billing zarejestruj metodę płatności przez „Add payment details”, a następnie doładuj środki przez „Add to credit balance”."
    limit: "Na stronie Limits użyj „Edit spend limit”, aby ustawić miesięczny limit użycia."
  openrouter:
    tagline: "Dostępnych jest wiele modeli. Musisz wcześniej doładować środki."
    step1: "Zaloguj się w OpenRouter i otwórz stronę API keys."
    step2: "Kliknij „New Key”, nadaj dowolną nazwę i kliknij „Create”. Opisany poniżej limit wydatków również wprowadza się tutaj."
    step3: "Skopiuj klucz. Jest wyświetlany tylko raz, więc skopiuj go od razu."
    note: "Priorytet dostawców można dostroić w ustawieniach rozszerzenia."
    billing: "Musisz wcześniej doładować środki. Na stronie Credits kliknij „Add Credits”, wpisz kwotę i potwierdź przez „Purchase”."
    limit: "Podczas tworzenia klucza wpisz kwotę w polu „Credit limit” i wybierz okres w „Reset limit every...”, aby ustawić limit użycia na okres."

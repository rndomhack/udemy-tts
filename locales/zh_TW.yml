guide:
  title: "如何使用翻譯服務商"
  intro: "翻譯功能使用生成式 AI。請從下方的服務商中選擇一個，取得 API 金鑰並填入擴充功能設定，只需幾分鐘即可完成。"
  privacy: "API 金鑰僅儲存在您的瀏覽器中，且只會傳送給您所選的服務商。"
  disclaimer: "使用服務商及相關費用由您自行承擔。為以防萬一，建議設定消費上限。"
  commonStep: "將複製的金鑰貼到擴充功能設定的「API 金鑰」欄位，選擇模型後點選「測試連線」。"
  openSettings: "開啟設定"
  optionsLink: "如何使用翻譯服務商"
  modelsHeading: "可用模型"
  modelsHint: "擴充功能提供以下模型作為預設。翻譯需處理大量簡短字幕，因此便宜又快速的模型就足夠了。以下是各模型在品質、速度與費用方面的比較。"
  keyHeading: "取得 API 金鑰"
  billingHeading: "價格與付款"
  limitHeading: "控制消費金額"
  models:
    gemini31FlashLite: "速度: 高 | 精度: 中 | 費用: 低 | 精度對翻譯來說足夠。不確定要選哪個時建議使用。"
    gemini35FlashLite: "速度: 高 | 精度: 高 | 費用: 中 | 3.1 系列的後繼模型，精度顯著提升，但費用略高。"
    gemma431bIt: "速度: 低 | 精度: 低 | 費用: 免費 | 可在免費額度下使用。主要想壓低成本時的選擇。"
    gpt54Mini: "速度: 中 | 精度: 高 | 費用: 高 | 費用較高，適合優先考量品質的情況。"
    gpt54Nano: "速度: 中 | 精度: 中 | 費用: 低 | 比 mini 便宜，但用於翻譯很實用。"
    deepseekV4Flash: "速度: 中 | 精度: 高 | 費用: 低 | 相當便宜，但精度很高。注重成本時的首選。"
    qwen36Flash: "速度: 高 | 精度: 中 | 費用: 低 | 價格低廉，精度也還不錯。"
  gemini:
    tagline: "可使用 Gemini，還有免費的 Gemma。不確定要選哪個時建議使用。"
    step1: "開啟 Google AI Studio 並使用 Google 帳戶登入。"
    step2: "點選「建立 API 金鑰」，為金鑰命名，選擇一個專案（或使用「建立專案」），然後點選「建立金鑰」。"
    step3: "複製顯示出來的 API 金鑰。"
    note: "免費額度有速率限制，但通常足以觀看課程。"
    billing: "免費額度無需付款資訊。啟用帳單後即使是免費模型也會放寬速率限制，但請注意：帳單採預付制，在購買抵免額之前 API 金鑰將無法使用。若要啟用帳單，請在「帳單」頁面使用「設定帳單」登記付款資訊，然後透過「購買抵免額」購買（最低金額會顯示在畫面上）。"
    limit: "在「支出」頁面，「每月支出上限」可設定每月使用上限。使用「編輯支出上限」來指定金額。"
  openai:
    tagline: "可使用 ChatGPT 模型。需要事先購買額度。"
    step1: "登入 OpenAI Platform 並開啟 API keys 頁面。"
    step2: "點選「Create new secret key」並任意命名。"
    step3: "複製金鑰。金鑰只會顯示一次，請立即複製。"
    note: "這與付費的 ChatGPT 方案是分開的。"
    billing: "需要事先購買額度。在 Billing 頁面，透過「Add payment details」登記付款方式，然後透過「Add to credit balance」購買額度。"
    limit: "在 Limits 頁面，使用「Edit spend limit」設定每月使用上限。"
  openrouter:
    tagline: "可使用眾多模型。需要事先購買額度。"
    step1: "登入 OpenRouter 並開啟 API keys 頁面。"
    step2: "點選「New Key」，任意命名，然後點選「Create」。下述的消費上限也在此處輸入。"
    step3: "複製金鑰。金鑰只會顯示一次，請立即複製。"
    note: "服務商優先順序可在擴充功能設定中調整。"
    billing: "需要事先購買額度。在 Credits 頁面點選「Add Credits」，輸入金額，然後透過「Purchase」確認。"
    limit: "建立金鑰時，在「Credit limit」中輸入金額，並在「Reset limit every...」中選擇週期，即可設定每個週期的使用上限。"

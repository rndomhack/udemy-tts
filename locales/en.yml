guide:
  title: "How to use translation providers"
  intro: "Translation uses generative AI. Pick one of the providers below, get an API key, and set it in the extension settings — it only takes a few minutes."
  privacy: "Your API key is stored only in your browser and is sent only to the provider you selected."
  disclaimer: "You use and pay for the provider at your own risk. We recommend setting a spend limit just in case."
  commonStep: "Paste the copied key into the \"API key\" field in the extension settings, choose a model, and click \"Test connection\"."
  openSettings: "Open settings"
  optionsLink: "How to use translation providers"
  modelsHeading: "Available models"
  modelsHint: "The extension offers the following models as presets. Translation processes many short subtitles, so a cheap, fast model is plenty. Here is how each model compares on quality, speed, and cost."
  keyHeading: "Getting an API key"
  billingHeading: "Pricing and payment"
  limitHeading: "Controlling your spend"
  models:
    gemini31FlashLite: "Speed: High | Accuracy: Medium | Cost: Low | Accuracy is plenty for translation. Recommended if you're not sure."
    gemini35FlashLite: "Speed: High | Accuracy: High | Cost: Medium | The successor to the 3.1 series, with notably higher accuracy but a somewhat higher price."
    gemma431bIt: "Speed: Low | Accuracy: Low | Cost: Free | Usable on the free tier. The pick when you mainly want to keep costs down."
    gpt54Mini: "Speed: Medium | Accuracy: High | Cost: High | Cost is high, so it fits when you prioritize quality."
    gpt54Nano: "Speed: Medium | Accuracy: Medium | Cost: Low | Cheaper than mini, but practical for translation."
    deepseekV4Flash: "Speed: Medium | Accuracy: High | Cost: Low | Quite cheap, yet accuracy is high. The top pick when cost matters."
    qwen36Flash: "Speed: High | Accuracy: Medium | Cost: Low | Inexpensive, with decent accuracy too."
  gemini:
    tagline: "Gemini is available, plus the free Gemma. Recommended if you're not sure which to pick."
    step1: "Open Google AI Studio and sign in with your Google account."
    step2: "Click \"Create API key\", name the key, choose a project (or use \"Create project\"), then click \"Create key\"."
    step3: "Copy the API key that is shown."
    note: "The free tier has rate limits, but it is usually enough for watching lectures."
    billing: "No payment info is needed on the free tier. Enabling billing relaxes rate limits even for free models, but note that billing is prepaid: your API key stops working until you buy credits. To enable billing, use \"Set up billing\" on the Billing page to register your payment info, then buy credits with \"Buy credits\" (the minimum amount is shown in the UI)."
    limit: "On the Spend page, \"Monthly spend cap\" sets a monthly usage limit. Use \"Edit spend cap\" to set the amount."
  openai:
    tagline: "ChatGPT models are available. You need to buy credit in advance."
    step1: "Sign in to the OpenAI Platform and open the API keys page."
    step2: "Click \"Create new secret key\" and give it any name."
    step3: "Copy the key. It is shown only once, so copy it on the spot."
    note: "This is separate from a paid ChatGPT plan."
    billing: "You need to buy credit in advance. On the Billing page, register a payment method via \"Add payment details\", then buy credit via \"Add to credit balance\"."
    limit: "On the Limits page, use \"Edit spend limit\" to set a monthly usage limit."
  openrouter:
    tagline: "Many models are available. You need to buy credits in advance."
    step1: "Sign in to OpenRouter and open the API keys page."
    step2: "Click \"New Key\", give it any name, and click \"Create\". The spend limit described below is also entered here."
    step3: "Copy the key. It is shown only once, so copy it on the spot."
    note: "Provider priority can be tuned in the extension settings."
    billing: "You need to buy credits in advance. On the Credits page, click \"Add Credits\", enter an amount, and confirm with \"Purchase\"."
    limit: "When creating a key, enter an amount in \"Credit limit\" and pick a period in \"Reset limit every...\" to set a usage cap per period."
